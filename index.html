  ev.preventDefault(); try{ svg.setPointerCapture&&svg.setPointerCapture(ev.pointerId); }catch(_){} // si falla no debe abortar la selección
  const w=toWorld(ev);
  // vista cliente = solo lectura: solo navegar (mano, botón medio, Shift+arrastre); nada se edita
  if(vistaCliente && !(tool==="pan"||ev.button===1||((tool==="select"||tool==="marquee")&&ev.shiftKey))){
    if(tool==="select"){ action={type:"pan",sx:ev.clientX,sy:ev.clientY,ox:vb.x,oy:vb.y}; return; } // arrastrar = mover lienzo
    avisar("✨ Vista cliente (solo lectura) — tocá ✨ para volver a editar."); return; }
  if(calibMode){
    if(!calibMode.p1){ calibMode.p1={x:w.x,y:w.y};
      const hh=document.getElementById("hint");
      hh.textContent="CALIBRACIÓN 📐: ahora hacé clic en el OTRO extremo de esa distancia"; render(); return; }
    const d0=Math.hypot(w.x-calibMode.p1.x,w.y-calibMode.p1.y);
    const p1=calibMode.p1; calibMode=null; updateHint();
    if(d0>=2){
      pedir("¿Cuántos CENTÍMETROS reales hay entre esos dos puntos? (ej: puerta = 90, pared = 300)","300","number").then(real=>{
        if(real&&+real>0&&doc.fondo){ const k=(+real)/d0;
          doc.fondo.wCm*=k;
          doc.fondo.x=p1.x-(p1.x-doc.fondo.x)*k;
          doc.fondo.y=p1.y-(p1.y-doc.fondo.y)*k;
          scheduleSave(); }
        render(); });
      return; }
    render(); return; }
  if(linkMode){
    const host=ev.target.closest&&ev.target.closest('[data-kind="element"]');
    if(host){ const id=host.getAttribute("data-id");
      const lz=doc.elements.find(x=>x.id===id);
      const sw=doc.elements.find(x=>x.id===linkMode);
      if(sw&&lz&&LIGHT_TYPES.includes(lz.type)){ sw.controla=sw.controla||[];
        const i=sw.controla.indexOf(id);
        if(i>=0) sw.controla.splice(i,1); else sw.controla.push(id);
        pushHistory(); render(); return; } }
    linkMode=null; updateHint(); render(); return; }
  if(tool==="pan" || ev.button===1 || ((tool==="select"||tool==="marquee")&&ev.shiftKey)){ action={type:"pan",sx:ev.clientX,sy:ev.clientY,ox:vb.x,oy:vb.y}; return; }

  if(tool==="marquee"){ action={type:"marquee",x0:w.x,y0:w.y,x1:w.x,y1:w.y}; render(); return; } // Marco: siempre selección por caja
  if(tool==="select"){ return startSelect(ev,w); }

  if(tool==="wall"){ let sp;
    if(draft){ sp=snapWorld(w,null); let b=applyLock(draft.start,sp,ev.shiftKey);
      if(!sp.node) b=refSnapPoint(draft.start,b);
      const bn=sp.node||findOrCreateNode(b); const an=draft.startNode;
      const wid=uid("w");
      doc.walls.push({id:wid,a:an,b:bn,name:"",space:draft.space||"",material:"Ladrillo",piso:doc.pisoActivo});
      addXP(6); const created=(draft.created||[]).concat(wid);
      draft={type:"wall",start:N(bn),startNode:bn,cursor:N(bn),space:draft.space,created}; pushHistory(); render();
    } else { sp=snapWorld(w,null); const an=sp.node||findOrCreateNode({x:sp.x,y:sp.y});
      draft={type:"wall",start:N(an),startNode:an,cursor:N(an),created:[]}; render(); }
    return; }

  if(tool==="curve"){ const sp=snapWorld(w,null);
    if(!draft){ const an=sp.node||findOrCreateNode({x:sp.x,y:sp.y});
      draft={type:"curve",start:N(an),startNode:an,cursor:N(an)}; render(); }
    else { let b=applyLock(draft.start,sp,ev.shiftKey); if(!sp.node) b=refSnapPoint(draft.start,b);
      const bn=sp.node||findOrCreateNode(b); const an=draft.startNode;
      const A=N(an),B=N(bn); const L=Math.hypot(B.x-A.x,B.y-A.y)||1;
      if(bn===an||L<2){ return; } // segundo toque igual al inicio: ignorar
      const bow=Math.round(Math.max(15,Math.min(L*0.18,120))); // arco por defecto, ajustable con el ◇
      const wid=uid("w");
      doc.walls.push({id:wid,a:an,b:bn,name:"",space:"",material:"Ladrillo",piso:doc.pisoActivo,curve:bow});
      addXP(6); draft=null; pushHistory(); setTool("select"); setSel([{type:"wall",id:wid}]); render(); }
    return; }

  if(tool==="room"){ const sp=snapWorld(w,null); draft={type:"room",start:{x:sp.x,y:sp.y},cursor:{x:sp.x,y:sp.y}}; return; }
  if(tool==="dim"){ const sp=snapWorld(w,null); draft={type:"dim",start:{x:sp.x,y:sp.y},cursor:{x:sp.x,y:sp.y}}; return; }

  if(tool==="door"||tool==="window"){ const nw=nearestWall(w,40/scale);
    if(nw){ const d0=nw.pr.t*wallLen(nw.w);
      draft={type:"opening",kind:tool==="door"?"door":"window",wallId:nw.w.id,d0:d0,d1:d0};
      render(); }
    return; }

  if(tool==="label"){ const sp={x:snapNum(w.x),y:snapNum(w.y)};
    const l={id:uid("l"),x:sp.x,y:sp.y,text:"Espacio",piso:doc.pisoActivo}; doc.labels.push(l);
    setSel([{type:"label",id:l.id}]); addXP(3); pushHistory(); render(); return; }

  if(tool==="text"){ const sp={x:snapNum(w.x),y:snapNum(w.y)};
    const tx={id:uid("tx"),x:sp.x,y:sp.y,text:"Texto",font:"sistema",size:40,color:"#dbe6f5",piso:doc.pisoActivo};
    doc.texts.push(tx); addXP(2); pushHistory(); setTool("select"); setSel([{type:"text",id:tx.id}]); render(); return; }

  if(tool==="photo"){ window.__photoPos={x:snapNum(w.x),y:snapNum(w.y)};
    document.getElementById("photoInput").click(); return; }

  if(tool==="stair"){ const sp=snapWorld(w,null);
    draft={type:"stair",start:{x:sp.x,y:sp.y},cursor:{x:sp.x,y:sp.y}}; render(); return; }

  if(tool==="route"){ const sp=snapRoutePoint(w);
    if(draft&&draft.type==="route"){ draft.pts.push(sp); }
    else draft={type:"route",pts:[sp],cursor:sp};
    render(); return; }

  if(CATS[tool]){ const sp={x:snapNum(w.x),y:snapNum(w.y)};
    if(document.body.classList.contains("mobile")){
      // dos toques: el 1º arma un fantasma; un 2º toque cerca (o ✔) confirma; lejos reubica; ✕ cancela
      if(pendingPlace&&Math.hypot(sp.x-pendingPlace.x,sp.y-pendingPlace.y)<44/scale){
        const pp=pendingPlace; pendingPlace=null; setTool("select"); colocarElemento(pp.cat,{x:pp.x,y:pp.y}); return; }
      pendingPlace={cat:tool,x:sp.x,y:sp.y}; avisar("Tocá ✔ (o el mismo punto) para colocar · ✕ cancela"); updateHint(); render(); return; }
    colocarElemento(tool,sp); return; }
}

// alta de un elemento eléctrico (tap en canvas o drop desde la bandeja)
let pendingPlace=null; // colocación pendiente en móvil: {cat,x,y} — confirmación en dos toques
function colocarElemento(cat,sp){
  const et=(settings.varByCat[cat]&&CATS[cat].includes(settings.varByCat[cat]))?settings.varByCat[cat]:CATS[cat][0];
  const e={id:uid("e"),type:et,x:sp.x,y:sp.y,label:"",notes:"",piso:doc.pisoActivo}; doc.elements.push(e);
  settings.recientes=[et,...(settings.recientes||[]).filter(x=>x!==et)].slice(0,6); // recientes de la biblioteca
  setSel([{type:"element",id:e.id}]); addXP(3); pushHistory(); render();
  const inf=elInfo(et); avisarCot(inf.icon+" "+inf.name+" añadido — total "+mon(cotTotales().total));
  return e;
}

function startSelect(ev,w){
  const tgt=ev.target;
  // modo pincel (cuentagotas): aplicar el formato copiado a objetos del mismo tipo
  if(pintarFormato){ const h=tgt.closest&&tgt.closest("[data-kind]");
    if(h&&aplicarFormato(h.getAttribute("data-kind"),h.getAttribute("data-id"))) return;
    pintarFormato=false; updateHint(); render(); return; }
  // rombo de curvatura (Illustrator): antes que todo
  if(tgt&&tgt.getAttribute&&tgt.getAttribute("data-kind")==="chandle"){
    const wid=tgt.getAttribute("data-id"); const wl=doc.walls.find(x=>x.id===wid);
    if(wl){ action={type:"chandle",wl,moved:false}; return; }
  }
  // agarradera de apertura (pequeña y precisa)
  if(tgt&&tgt.getAttribute&&tgt.getAttribute("data-kind")==="ohandle"){
    const oid=tgt.getAttribute("data-id"), end=+tgt.getAttribute("data-end");
    const o=doc.openings.find(x=>x.id===oid);
    if(o){ setSel([{type:"opening",id:oid}]); action={type:"ohandle",o,end,moved:false}; return; }
  }
  // agarradera de tamaño del texto ◢ (antes que el nodo)
  if(tgt&&tgt.getAttribute&&tgt.getAttribute("data-kind")==="txresize"){
    const id=tgt.getAttribute("data-id"); const tx=doc.texts.find(x=>x.id===id);
    if(tx){ const wpt=toWorld(ev); const d0=Math.max(1,Math.hypot(wpt.x-tx.x,wpt.y-tx.y));
      action={type:"txresize",tx,size0:tx.size||40,d0,moved:false}; return; } }
  const nn=nearestNode(w);
  if(nn){ action={type:"node",id:nn,moved:false}; return; }
  const t=ev.target;
  const host=t.closest&&t.closest("[data-kind]");
  const k=host&&host.getAttribute("data-kind"), id=host&&host.getAttribute("data-id");
  const ctrl=ev.ctrlKey||ev.metaKey;
  if(k&&id){
    // Ctrl+clic: añadir/quitar de la selección
    if(ctrl){ toggleSel(k,id); render(); return; }
    // clic sobre algo YA seleccionado en selección múltiple → mover todo el grupo
    if(selection.length>1&&isSelected(k,id)){ beginMoveSel(w); return; }
    // selección simple + arrastre normal
    if(k==="wall"){ setSel([{type:"wall",id}]); const wl=doc.walls.find(x=>x.id===id);
      action={type:"wall",id,sx:w.x,sy:w.y,a0:{...N(wl.a)},b0:{...N(wl.b)},wall:wl,moved:false}; render(); return; }
    if(k==="element"){ setSel([{type:"element",id}]); const e=doc.elements.find(x=>x.id===id);
      action={type:"element",id,dx:w.x-e.x,dy:w.y-e.y,moved:false}; render(); return; }
    if(k==="label"){ setSel([{type:"label",id}]); const l=doc.labels.find(x=>x.id===id);
      action={type:"label",id,dx:w.x-l.x,dy:w.y-l.y,moved:false}; render(); return; }
    if(k==="text"){ setSel([{type:"text",id}]); const tx=doc.texts.find(x=>x.id===id);
      action={type:"text",id,dx:w.x-tx.x,dy:w.y-tx.y,moved:false}; render(); return; }
    if(k==="opening"){ setSel([{type:"opening",id}]);
      const o=doc.openings.find(x=>x.id===id);
      action=o?{type:"omove",o,moved:false}:null; render(); return; }
    if(k==="route"){ setSel([{type:"route",id}]); render(); return; }
    if(k==="stair"){ setSel([{type:"stair",id}]); const st=doc.stairs.find(x=>x.id===id);
      action=st?{type:"stairmove",st,dx:w.x-st.x,dy:w.y-st.y,moved:false}:null; render(); return; }
    if(k==="photo"){ setSel([{type:"photo",id}]); const ph=doc.photos.find(x=>x.id===id);
      action=ph?{type:"photomove",ph,dx:w.x-ph.x,dy:w.y-ph.y,moved:false}:null; render(); return; }
    if(k==="dim"){ setSel([{type:"dim",id}]); render(); return; }
  }
  // Elegir: tocar en vacío deselecciona (la selección por CAJA es la herramienta Marco)
  setSel([]); render();
}

function onMove(ev){
  const w=toWorld(ev);
  if(calibMode){ calibMode.cursor=w; if(calibMode.p1) render(true); return; }
  if(action){
    if(action.type==="pan"){ const r=svg.getBoundingClientRect();
      vb.x=action.ox-(ev.clientX-action.sx)/r.width*vb.w;
      vb.y=action.oy-(ev.clientY-action.sy)/r.height*vb.h; applyViewBox(); render(true); return; }
    if(action.type==="marquee"){ action.x1=w.x; action.y1=w.y; render(true); return; }
    if(action.type==="ohandle"){ const o=action.o; const wl=doc.walls.find(x=>x.id===o.wallId);
      if(wl){ const L=wallLen(wl); const pr=projectOnWall(wl,w); const pd=pr.t*L;
        let a=o.d-o.width/2, b=o.d+o.width/2;
        if(action.end===0) a=Math.min(pd,b-20); else b=Math.max(pd,a+20);
        a=Math.max(2,a); b=Math.min(L-2,b);
        o.width=Math.round(b-a); o.d=(a+b)/2; action.moved=true; render(true); }
      return; }
    if(action.type==="omove"){ const o=action.o; const wl=doc.walls.find(x=>x.id===o.wallId);
      if(wl){ const L=wallLen(wl); const pr=projectOnWall(wl,w); const margin=o.width/2+5;
        o.d=Math.max(margin,Math.min(pr.t*L,L-margin)); action.moved=true; render(true); }
      return; }
    if(action.type==="moveSel"){ const dx=snapNum(w.x-action.sx), dy=snapNum(w.y-action.sy);
      action.nodes.forEach(n=>{ doc.nodes[n.id]={x:n.x+dx,y:n.y+dy}; });
      action.els.forEach(o=>{ o.e.x=o.x+dx; o.e.y=o.y+dy; });
      action.lbs.forEach(o=>{ o.l.x=o.x+dx; o.l.y=o.y+dy; });
      (action.rts||[]).forEach(o=>{ o.r.pts=o.pts0.map(p=>({x:p.x+dx,y:p.y+dy})); });
      (action.phs||[]).forEach(o=>{ o.p.x=o.x+dx; o.p.y=o.y+dy; });
      (action.sts||[]).forEach(o=>{ o.st.x=o.x+dx; o.st.y=o.y+dy; });
      (action.txs||[]).forEach(o=>{ o.t.x=o.x+dx; o.t.y=o.y+dy; });
      action.moved=true; render(true); return; }
    if(action.type==="chandle"){ const wl=action.wl; const A=N(wl.a),B=N(wl.b);
      const mx=(A.x+B.x)/2,my=(A.y+B.y)/2;
      const Lc=Math.hypot(B.x-A.x,B.y-A.y)||1;
      const nx=-(B.y-A.y)/Lc, ny=(B.x-A.x)/Lc;
      let off=((w.x-mx)*nx+(w.y-my)*ny)*2; // el pico visible está a curve/2
      if(Math.abs(off)<10) off=0; // imán a "recta"
      wl.curve=Math.round(off); action.moved=true; render(true); return; }
    if(action.type==="stairmove"){ action.st.x=snapNum(w.x-action.dx);
      action.st.y=snapNum(w.y-action.dy); action.moved=true; render(true); return; }
    if(action.type==="photomove"){ action.ph.x=snapNum(w.x-action.dx);
      action.ph.y=snapNum(w.y-action.dy); action.moved=true; render(true); return; }
    if(action.type==="node"){ const sp={x:snapNum(w.x),y:snapNum(w.y)};
      doc.nodes[action.id]={x:sp.x,y:sp.y}; action.moved=true; render(true); return; }
    if(action.type==="wall"){ const dx=w.x-action.sx, dy=w.y-action.sy; action.moved=true;
      doc.nodes[action.wall.a]={x:snapNum(action.a0.x+dx),y:snapNum(action.a0.y+dy)};
      doc.nodes[action.wall.b]={x:snapNum(action.b0.x+dx),y:snapNum(action.b0.y+dy)}; render(true); return; }
    if(action.type==="element"){ const e=doc.elements.find(x=>x.id===action.id);
      const rx=w.x-action.dx, ry=w.y-action.dy;
      e.x=snapNum(rx); e.y=snapNum(ry); aplicarGuias(e,rx,ry); action.moved=true; render(true); return; }
    if(action.type==="label"){ const l=doc.labels.find(x=>x.id===action.id);
      const rx=w.x-action.dx, ry=w.y-action.dy;
      l.x=snapNum(rx); l.y=snapNum(ry); aplicarGuias(l,rx,ry); action.moved=true; render(true); return; }
    if(action.type==="text"){ const tx=doc.texts.find(x=>x.id===action.id);
      const rx=w.x-action.dx, ry=w.y-action.dy;
      tx.x=snapNum(rx); tx.y=snapNum(ry); aplicarGuias(tx,rx,ry); action.moved=true; render(true); return; }
    if(action.type==="txresize"){ const tx=action.tx; const d=Math.hypot(w.x-tx.x,w.y-tx.y);
      tx.size=Math.max(6,Math.round(action.size0*d/action.d0)); action.moved=true; render(true); return; }
  }
  if(draft){
    if(draft.type==="curve"){ const sp2=snapWorld(w,draft.startNode); let bb=applyLock(draft.start,sp2,ev.shiftKey);
      if(!sp2.node) bb=refSnapPoint(draft.start,bb); draft.cursor=bb; render(); return; }
    if(draft.type==="route"){ draft.cursor=snapRoutePoint(w); render(); return; }
    if(draft.type==="opening"){ const wl=doc.walls.find(x=>x.id===draft.wallId);
      if(wl){ const pr=projectOnWall(wl,w); draft.d1=pr.t*wallLen(wl); } render(); return; }
    const sp=snapWorld(w, draft.startNode);
    if(draft.type==="wall"){ let bb=applyLock(draft.start,sp,ev.shiftKey);
      if(!sp.node) bb=refSnapPoint(draft.start,bb);
      draft.refMatch=!!bb.refMatch; draft.cursor=bb; }
    else draft.cursor={x:sp.x,y:sp.y}; render(); return; }
  // hover snap feedback
  if(tool==="wall"||tool==="room"||tool==="dim"){ snapWorld(w,null); }
}

function onUp(ev){
  if(action){
    if(action.type==="marquee"){
      const r={x1:Math.min(action.x0,action.x1),y1:Math.min(action.y0,action.y1),
               x2:Math.max(action.x0,action.x1),y2:Math.max(action.y0,action.y1)};
      const tiny=(r.x2-r.x1)<12/scale&&(r.y2-r.y1)<12/scale; // umbral apto para dedo (antes 6px, disparaba marco al toque)
      if(tiny){ setSel([]); } // clic en vacío = deseleccionar
      else setSel(marqueeSelect(r));
      action=null; render(); return;
    }
    if(draft&&draft.type==="room"){ commitRoom(); }
    else if(draft&&draft.type==="dim"){ commitDim(); }
    if(action.moved){ pushHistory(); }
    action=null; hoverSnap=null; smartGuides.length=0; render(); return;
  }
  if(draft&&(draft.type==="room")){ commitRoom(); }
  if(draft&&(draft.type==="dim")){ commitDim(); }
  if(draft&&(draft.type==="stair")&&draft.cursor){ commitStair(); }
  if(draft&&(draft.type==="opening")){ commitOpening(); }
}
function commitOpening(){
  const w=doc.walls.find(x=>x.id===draft.wallId); if(!w){ draft=null; render(); return; }
  const L=wallLen(w); const kind=draft.kind;
  let a=Math.min(draft.d0,draft.d1), b=Math.max(draft.d0,draft.d1);
  let width=b-a;
  if(width<15){ width=kind==="door"?80:100; a=draft.d0-width/2; } // clic corto = tamaño estándar
  width=Math.max(20,Math.min(width,L-10));
  let d=a+width/2; const margin=width/2+5;
  d=Math.max(margin,Math.min(d,L-margin));
  const o={id:uid("o"),wallId:w.id,d:d,kind:kind,width:Math.round(width)};
  doc.openings.push(o); addXP(4); draft=null; pushHistory();
  setTool("select"); setSel([{type:"opening",id:o.id}]); render();
}
// room/dim se completan al soltar el arrastre iniciado en onDown
svg.addEventListener("pointerup",function(ev){
  if(draft&&draft.type==="room"&&draft.cursor){ if(dist(draft.start,draft.cursor)>20){commitRoom();} draft=null; render(); }
  if(draft&&draft.type==="dim"&&draft.cursor){ if(dist(draft.start,draft.cursor)>10){commitDim();} draft=null; render(); }
  if(draft&&draft.type==="stair"&&draft.cursor){ commitStair(); }
});
function shapePoints(shape,a,b){
  const x1=Math.min(a.x,b.x),y1=Math.min(a.y,b.y),x2=Math.max(a.x,b.x),y2=Math.max(a.y,b.y);
  const w=x2-x1,h=y2-y1,w3=w/3,h2=h/2,w2=w/2;
  if(shape==="L") return [[x1,y1],[x1+w2,y1],[x1+w2,y1+h2],[x2,y1+h2],[x2,y2],[x1,y2]];
  if(shape==="T") return [[x1,y1],[x2,y1],[x2,y1+h2],[x1+2*w3,y1+h2],[x1+2*w3,y2],[x1+w3,y2],[x1+w3,y1+h2],[x1,y1+h2]];
  if(shape==="U") return [[x1,y1],[x1+w3,y1],[x1+w3,y1+h2],[x2-w3,y1+h2],[x2-w3,y1],[x2,y1],[x2,y2],[x1,y2]];
  return [[x1,y1],[x2,y1],[x2,y2],[x1,y2]];
}
function commitRoom(){
  const pts=shapePoints(settings.roomShape||"rect",draft.start,draft.cursor);
  const ns=pts.map(p=>findOrCreateNode({x:snapNum(p[0]),y:snapNum(p[1])}));
  const created=[];
  for(let i=0;i<ns.length;i++){ const p=ns[i],q=ns[(i+1)%ns.length];
    if(p!==q){ const wid=uid("w");
      doc.walls.push({id:wid,a:p,b:q,name:"",space:"",material:"Ladrillo",piso:doc.pisoActivo}); created.push(wid); } }
  addXP(20); pushHistory();
  // como al terminar paredes: pasar a la flecha con el cuarto seleccionado
  draft=null; setTool("select"); setSel(created.map(id=>({type:"wall",id})));
}
function commitStair(){
  const a=draft.start,b=draft.cursor; draft=null;
  const largo=Math.hypot(b.x-a.x,b.y-a.y);
  if(largo<60){ avisar("Arrastrá el recorrido completo de la escalera (mínimo 60 cm)."); render(); return; }
  const st={id:uid("st"),piso:doc.pisoActivo,x:a.x,y:a.y,ang:Math.atan2(b.y-a.y,b.x-a.x),
    largo:Math.round(largo),ancho:90,alturaTotal:Math.round((settings.wallH||250)+20),chMax:18};
  doc.stairs.push(st); addXP(8); pushHistory();
  setTool("select"); setSel([{type:"stair",id:st.id}]); render();
}
function commitDim(){ doc.dims.push({id:uid("d"),a:{...draft.start},b:{...draft.cursor},piso:doc.pisoActivo}); addXP(3); pushHistory(); }

/* ===================== Panel derecho ===================== */
let tab="insp";
function abrirTab(t){ tab=t;
  document.querySelectorAll(".tabs button").forEach(x=>x.classList.toggle("on",x.dataset.tab===t));
  renderPanel();
  if(document.body.classList.contains("mobile")&&sheetState==="peek") setSheet("mid"); }
document.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>abrirTab(b.dataset.tab));

function renderPanel(){ const p=document.getElementById("panelbody");
  updateCotBadge();
  if(tab==="layers") return renderLayers(p);
  if(tab==="cot") return renderCot(p);
  if(tab==="cir") return renderCircuits(p);
  return renderInspector(p); }

function field(label,inputHtml){ return `<div class="field"><label>${label}</label>${inputHtml}</div>`; }

function renderInspector(p){
  if(selection.length>1){
    const cnt={}; selection.forEach(s=>cnt[s.type]=(cnt[s.type]||0)+1);
    const selElems=selection.filter(s=>s.type==="element")
      .map(s=>doc.elements.find(e=>e.id===s.id)).filter(e=>esElectrico(e));
    let cableInfo="", parSW=null, parLZ=null;
    if(selection.length===2&&selection.every(s=>s.type==="element")){
      const a=doc.elements.find(e=>e.id===selection[0].id), b=doc.elements.find(e=>e.id===selection[1].id);
      if(a&&b){ const rc=cableEntreDosM(a,b);
        parSW=[a,b].find(x=>SWITCH_TYPES.includes(x.type)); parLZ=[a,b].find(x=>LIGHT_TYPES.includes(x.type));
        const yaV=parSW&&parLZ&&(parSW.controla||[]).includes(parLZ.id);
        const linkBtn=(parSW&&parLZ)?(yaV?`<div class="muted" style="margin-top:5px">🔗 Apagador y luz vinculados</div>`:`<button id="f_linkpair" style="width:100%;justify-content:center;margin-top:6px">🔗 Vincular apagador y luz</button>`):"";
        cableInfo=`<div style="background:var(--panel2);border-radius:9px;padding:9px 11px;margin:6px 0">
          <div style="font-weight:700">🔌 Cable entre los 2</div>
          <div style="font-family:var(--mono);font-size:13px;margin-top:3px;line-height:1.7">📏 Distancia: ${fmt(rc.recta_m*100)}<br>🔌 Estimado: ${fmt(rc.cable_m*100)} <span style="color:var(--soft)">entubado</span><br>💰 ${mon(rc.costo)}</div>
          <div class="muted" style="font-size:11px;margin-top:2px">Ortogonal + bajadas + ${settings.desperdicio||0}% desperdicio.</div>
          ${linkBtn}</div>`; } }
    const cirOpts=`<option value="">— elegir circuito —</option>`+
      doc.circuits.map(c=>`<option value="${c.id}">⬤ ${c.name} · ${c.amps}A</option>`).join("")+
      `<option value="__new__">＋ Nuevo circuito…</option>`;
    p.innerHTML=`<div class="kdt">Selección múltiple</div>
      <div class="big">${selection.length}</div>
      <p class="muted">${cnt.wall?cnt.wall+" pared(es) · ":""}${cnt.element?cnt.element+" elemento(s) · ":""}${cnt.route?cnt.route+" tubo(s) · ":""}${cnt.photo?cnt.photo+" foto(s) · ":""}${cnt.label?cnt.label+" texto(s) · ":""}${cnt.dim?cnt.dim+" cota(s)":""}</p>
      <p class="muted">Arrastra cualquier pieza seleccionada para mover todo el grupo. Ctrl+clic añade o quita.</p>
      ${cableInfo}
      ${selElems.length?field("⚡ Asignar circuito a los "+selElems.length+" puntos",`<select id="f_circall">${cirOpts}</select>`):""}
      <button id="f_dup" style="width:100%;justify-content:center;margin-top:4px">⧉ Duplicar selección (Ctrl+D)</button>
      <button id="f_delall" class="danger" style="width:100%;justify-content:center;margin-top:8px">🗑 Eliminar selección (${selection.length})</button>`;
    const flp=document.getElementById("f_linkpair");
    if(flp) flp.onclick=()=>{ if(parSW&&parLZ){ parSW.controla=parSW.controla||[]; if(!parSW.controla.includes(parLZ.id)) parSW.controla.push(parLZ.id); pushHistory(); render(); avisar("🔗 Apagador y luz vinculados"); } };
    const fc=document.getElementById("f_circall");
    if(fc) fc.onchange=ev=>{ let cid=ev.target.value; if(!cid)return;
      if(cid==="__new__"){ const c=addCircuit(); cid=c.id; }
      selElems.forEach(e=>e.circuitId=cid); pushHistory(); render(); };
    document.getElementById("f_dup").onclick=duplicateSelection;
    document.getElementById("f_delall").onclick=deleteSelected;
    return;
  }
  if(!selected){ p.innerHTML=`<div class="xp"><span>⭐ XP ${xp}</span><div class="xpbar"><i style="width:${Math.min(100,xp%100)}%"></i></div><span>Nv ${Math.floor(xp/100)+1}</span></div>
    <p class="muted" style="margin-top:16px">Nada seleccionado.<br><br>Elige una herramienta a la izquierda y empieza a dibujar. Con la flecha (Sel): clic selecciona, <b>arrastre en vacío = marco de selección</b>, Ctrl+clic añade.</p>
    <div class="kdt" style="margin-top:20px">Resumen</div>
    <p class="muted">Paredes: <b>${doc.walls.length}</b> · Aperturas: <b>${doc.openings.length}</b> · Elementos: <b>${doc.elements.length}</b> · Espacios: <b>${doc.labels.length}</b><br>Área de esta planta: <b>${(detectRooms().reduce((s,r)=>s+r.area,0)/10000).toFixed(1)} m²</b> · Escaleras: <b>${(doc.stairs||[]).filter(enPiso).length}</b></p>`;
    // Biblioteca de símbolos buscable (Illustrator Symbols / Canva Elements)
    const cat4={}; Object.keys(CATS).forEach(c=>CATS[c].forEach(t=>cat4[t]=c));
    const item=k=>{ const i=ELEMENTS[k]; return `<button data-sym="${k}"><span>${i.icon}</span><small>${i.name}</small></button>`; };
    const lista=q=>{ q=(q||"").toLowerCase();
      const ks=Object.keys(ELEMENTS).filter(k=>cat4[k]&&(!q||ELEMENTS[k].name.toLowerCase().includes(q)||k.includes(q)));
      return ks.length?ks.map(item).join(""):`<p class="muted" style="grid-column:1/-1">Sin resultados…</p>`; };
    const rec=(settings.recientes||[]).filter(k=>ELEMENTS[k]&&cat4[k]).slice(0,4);
    p.innerHTML+=`<div class="kdt sec sep" style="margin:16px 0 6px">🔎 Biblioteca de símbolos</div>
      <input id="symq" placeholder="Buscar: toma, lámpara, timbre…" style="width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:8px 10px;font-size:13px">`+
      (rec.length?`<div class="kdt" style="margin:10px 0 0">Recientes</div><div class="symgrid">${rec.map(item).join("")}</div>`:"")+
      `<div class="symgrid" id="symlist">${lista("")}</div>`;
    const sq=document.getElementById("symq");
    if(sq) sq.oninput=()=>{ const sl=document.getElementById("symlist"); if(sl) sl.innerHTML=lista(sq.value); };
    p.onclick=ev=>{ const b=ev.target.closest("[data-sym]"); if(!b) return;
      const t2=b.dataset.sym, c2=cat4[t2]; if(!c2) return;
      settings.varByCat[c2]=t2; scheduleSave(); setTool(c2);
      avisar(ELEMENTS[t2].icon+" "+ELEMENTS[t2].name+" — tocá el plano para colocarlo."); };
    // tooltip flotante estilizado (#tip) al pasar el cursor por una ficha — reemplaza al title nativo
    p.onmouseover=ev=>{ const b=ev.target.closest("[data-sym]"); if(b) mostrarTipSimbolo(b); else hideTip(); };
    p.onmouseleave=hideTip;
    return; }
  if(selected.type==="wall"){ const w=doc.walls.find(x=>x.id===selected.id); if(!w){setSel([]);return renderInspector(p);}
    const L=wallLen(w);
    p.innerHTML=`<div class="kdt">Pared</div>
      <div class="big">${fmt(L)}</div>
      ${field("Nombre",`<input id="f_name" value="${w.name||""}" placeholder="p. ej. Muro cocina">`)}
      ${field("Medida real (cm)",`<div class="row"><input id="f_len" type="number" value="${Math.round(L)}"><button id="f_apply">Aplicar</button></div>`)}
      ${field("Espacio",`<input id="f_space" value="${w.space||""}" placeholder="Cocina, Sala…">`)}
      ${field("Material",selectHtml("f_mat",Object.keys(MATERIALS),w.material))}
      ${field("Grosor de esta pared (cm)",`<input id="f_th" type="number" min="1" value="${Math.round(grosorDe(w))}">`)}
      ${field("Pared curveada — curvatura en cm ± (o arrastrá el rombo ◇)",`<div class="row"><input id="f_curv" type="number" value="${Math.round(w.curve||0)}"><button id="f_recta" class="ghost">Recta</button></div>`)}
      ${field("Color (2D y 3D)",`<div class="row"><input id="f_col" type="color" value="${w.color||MAT_COLOR[w.material]||"#b7c6dc"}" style="height:38px;padding:2px"><button id="f_colAuto" class="ghost">Auto (material)</button></div>`)}
      <button id="f_del" class="danger" style="width:100%;justify-content:center">🗑 Eliminar pared</button>`;
    bind("f_name","input",v=>{w.name=v;render(true);scheduleSave();},true);
    bind("f_space","input",v=>{w.space=v;scheduleSave();},true);
    document.getElementById("f_mat").onchange=e=>{w.material=e.target.value;pushHistory();};
    document.getElementById("f_th").onchange=e=>{ const v=Math.max(1,+e.target.value||10);
      const ids=selection.filter(s=>s.type==="wall").map(s=>s.id); const set=ids.length?ids:[w.id];
      doc.walls.forEach(x=>{ if(set.includes(x.id)) x.t=v; }); pushHistory(); render(); };
    document.getElementById("f_curv").onchange=e=>{w.curve=+e.target.value||0;pushHistory();render();};
    document.getElementById("f_recta").onclick=()=>{w.curve=0;pushHistory();render();};
    document.getElementById("f_col").onchange=e2=>{w.color=e2.target.value;pushHistory();render();render3dIf();};
    document.getElementById("f_colAuto").onclick=()=>{delete w.color;pushHistory();render();render3dIf();};
    document.getElementById("f_apply").onclick=()=>{ const nl=+document.getElementById("f_len").value;
      if(nl>0){ const a=N(w.a),b=N(w.b); const ang=angleOf(a,b);
        doc.nodes[w.b]={x:a.x+Math.cos(ang)*nl,y:a.y+Math.sin(ang)*nl}; pushHistory(); render(); } };
    document.getElementById("f_del").onclick=()=>{ doc.walls=doc.walls.filter(x=>x.id!==w.id);
      doc.openings=doc.openings.filter(o=>o.wallId!==w.id); setSel([]); pushHistory(); render(); };
  }
  else if(selected.type==="element"){ const e=doc.elements.find(x=>x.id===selected.id); if(!e){setSel([]);return renderInspector(p);}
    const info=elInfo(e.type);
    const cirOpts=`<option value="">— sin circuito —</option>`+
      doc.circuits.map(c=>`<option value="${c.id}" ${e.circuitId===c.id?"selected":""}>⬤ ${c.name} · ${c.amps}A</option>`).join("")+
      `<option value="__new__">＋ Nuevo circuito…</option>`;
    const isPanel=e.type==="panel";
    p.innerHTML=`<div class="kdt">${info.icon} ${info.name}</div>
      ${field("Etiqueta",`<input id="f_lbl" value="${e.label||""}" placeholder="T1, Cocina…">`)}
      ${isPanel?"":field("⚡ Circuito",`<select id="f_cir">${cirOpts}</select>`)}
      ${HANGING.includes(e.type)?"":field("Altura de montaje (cm sobre piso)",`<input id="f_alt" type="number" value="${alturaOf(e)}">`)}
      ${isPanel?"":field(`Precio unitario (${settings.moneda}) — todos los "${info.name}" de ESTE proyecto`,`<input id="f_price" type="number" step="0.01" value="${priceOf(e.type)}">`)}
      ${SWITCH_TYPES.includes(e.type)?`<div class="field"><label>💡 Luces que controla (${(e.controla||[]).length})</label>
        <div class="muted" style="margin-bottom:6px">${(e.controla||[]).map(id=>{const lz=doc.elements.find(x=>x.id===id);return lz?elInfo(lz.type).icon+" "+(lz.label||elInfo(lz.type).name):null;}).filter(Boolean).join(" · ")||"ninguna — vinculá abajo"}</div>
        <button id="f_link" style="width:100%;justify-content:center">🔗 Vincular: tocá las luces en el plano</button></div>`:""}
      ${field("Notas",`<textarea id="f_notes" placeholder="Altura, observaciones…">${e.notes||""}</textarea>`)}
      ${field("Tipo",selectHtml("f_type",Object.keys(ELEMENTS).map(k=>k),e.type,k=>ELEMENTS[k].icon+" "+ELEMENTS[k].name))}
      <button id="f_qsel" class="ghost" style="width:100%;justify-content:center;margin-bottom:8px">⌖ Seleccionar todos los "${info.name}" (esta planta)</button>
      <button id="f_del" class="danger" style="width:100%;justify-content:center">🗑 Eliminar</button>`;
    bind("f_lbl","input",v=>{e.label=v;render(true);scheduleSave();},true);
    bind("f_notes","input",v=>{e.notes=v;scheduleSave();},true);
    const fAlt=document.getElementById("f_alt");
    if(fAlt) fAlt.onchange=ev=>{ e.alturaCm=+ev.target.value||0; pushHistory(); render3dIf(); };
    const fPrice=document.getElementById("f_price");
    if(fPrice) fPrice.onchange=ev=>{ doc.precios[e.type]=+ev.target.value||0; scheduleSave(); };
    const fLink=document.getElementById("f_link");
    if(fLink) fLink.onclick=()=>{ linkMode=e.id; updateHint(); render(true); };
    if(!isPanel){ document.getElementById("f_cir").onchange=ev=>{
      if(ev.target.value==="__new__"){ const c=addCircuit(); e.circuitId=c.id; }
      else e.circuitId=ev.target.value||null;
      pushHistory(); render(); }; }
    document.getElementById("f_type").onchange=ev=>{e.type=ev.target.value;pushHistory();render();};
    document.getElementById("f_qsel").onclick=()=>{ const tipo=e.type;
      setSel(doc.elements.filter(x=>x.type===tipo&&enPiso(x)).map(x=>({type:"element",id:x.id}))); render(); };
    document.getElementById("f_del").onclick=()=>{doc.elements=doc.elements.filter(x=>x.id!==e.id);setSel([]);pushHistory();render();};
  }
  else if(selected.type==="opening"){ const o=doc.openings.find(x=>x.id===selected.id); if(!o){setSel([]);return renderInspector(p);}
    const wp=doc.walls.find(x=>x.id===o.wallId); const Lw=wp?Math.round(wallLen(wp)):200;
    const dv=Math.round(o.d!==undefined?o.d:Lw/2);
    p.innerHTML=`<div class="kdt">${o.kind==="door"?"🚪 Puerta":"🪟 Ventana"}</div>
      ${field("Ancho (cm)",`<input id="f_w" type="number" value="${o.width}">`)}
      ${field(`Posición: <b id="f_dv">${dv}</b> cm desde el extremo (pared de ${Lw} cm)`,`<input id="f_t" type="range" min="0" max="${Lw}" value="${dv}">`)}
      ${o.kind==="door"?`<div class="row" style="margin-bottom:12px"><button id="f_flip" class="ghost" title="Cambia hacia qué lado abre la puerta: adentro o afuera de la pared" style="flex:1;justify-content:center">↔ Adentro / afuera</button><button id="f_swing" class="ghost" title="Cambia de qué extremo cuelga la puerta (lado de la bisagra)" style="flex:1;justify-content:center">⤸ Lado bisagra</button></div>`:""}
      <button id="f_del" class="danger" style="width:100%;justify-content:center">🗑 Eliminar</button>`;
    document.getElementById("f_w").oninput=e=>{o.width=+e.target.value||60;render(true);};
    document.getElementById("f_w").onchange=()=>pushHistory();
    document.getElementById("f_t").oninput=e=>{o.d=+e.target.value;
      const s=document.getElementById("f_dv"); if(s)s.textContent=Math.round(o.d); render(true);};
    document.getElementById("f_t").onchange=()=>pushHistory();
    const fFlip=document.getElementById("f_flip");
    if(fFlip) fFlip.onclick=()=>{ o.flip=!o.flip; pushHistory(); render(); render3dIf(); };
    const fSwing=document.getElementById("f_swing");
    if(fSwing) fSwing.onclick=()=>{ o.swing=!o.swing; pushHistory(); render(); render3dIf(); };
    document.getElementById("f_del").onclick=()=>{doc.openings=doc.openings.filter(x=>x.id!==o.id);setSel([]);pushHistory();render();};
  }
  else if(selected.type==="label"){ const l=doc.labels.find(x=>x.id===selected.id); if(!l){setSel([]);return renderInspector(p);}
    p.innerHTML=`<div class="kdt">Nombre de espacio</div>
      ${field("Texto",`<input id="f_txt" value="${l.text||""}">`)}
      <button id="f_auto" style="width:100%;justify-content:center;margin-bottom:8px">⚡ Distribuir tomas por norma (≤3,6 m)</button>
      <button id="f_del" class="danger" style="width:100%;justify-content:center">🗑 Eliminar</button>`;
    bind("f_txt","input",v=>{l.text=v;render(true);scheduleSave();},true);
    document.getElementById("f_auto").onclick=()=>distribuirTomas(l);
    document.getElementById("f_del").onclick=()=>{doc.labels=doc.labels.filter(x=>x.id!==l.id);setSel([]);pushHistory();render();};
  }
  else if(selected.type==="text"){ const tx=doc.texts.find(x=>x.id===selected.id); if(!tx){setSel([]);return renderInspector(p);}
    const fontOpts=Object.keys(FONTS).map(k=>`<option value="${k}" ${tx.font===k?"selected":""}>${FONT_NOM[k]}</option>`).join("");
    p.innerHTML=`<div class="kdt">🅣 Texto</div>
      ${field("Contenido",`<input id="f_tx" value="${(tx.text||"").replace(/"/g,"&quot;")}" placeholder="Escribe aquí…">`)}
      ${field("Tipografía",`<select id="f_tfont">${fontOpts}</select>`)}
      ${field(`Tamaño: <b id="f_tsv">${Math.round(tx.size||40)}</b> cm`,`<input id="f_tsize" type="range" min="8" max="300" value="${Math.round(tx.size||40)}">`)}
      ${field("Color",`<input id="f_tcol" type="color" value="${tx.color||"#dbe6f5"}" style="height:38px;padding:2px">`)}
      <button id="f_del" class="danger" style="width:100%;justify-content:center">🗑 Eliminar texto</button>`;
    bind("f_tx","input",v=>{tx.text=v;render(true);scheduleSave();},true);
    document.getElementById("f_tfont").onchange=e=>{tx.font=e.target.value;pushHistory();render();};
    document.getElementById("f_tsize").oninput=e=>{tx.size=+e.target.value;const s=document.getElementById("f_tsv");if(s)s.textContent=Math.round(tx.size);render(true);};
    document.getElementById("f_tsize").onchange=()=>pushHistory();
    document.getElementById("f_tcol").oninput=e=>{tx.color=e.target.value;render(true);};
    document.getElementById("f_tcol").onchange=()=>pushHistory();
    document.getElementById("f_del").onclick=()=>{doc.texts=doc.texts.filter(x=>x.id!==tx.id);setSel([]);pushHistory();render();};
  }
  else if(selected.type==="photo"){ const ph=doc.photos.find(x=>x.id===selected.id); if(!ph){setSel([]);return renderInspector(p);}
    p.innerHTML=`<div class="kdt">📷 Foto anclada</div>
      <div id="phThumb" style="width:100%;min-height:120px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--faint);margin-bottom:10px">Cargando…</div>
      ${field("Nota",`<textarea id="f_pnota" placeholder="¿Qué muestra esta foto?">${ph.nota||""}</textarea>`)}
      <button id="f_del" class="danger" style="width:100%;justify-content:center">🗑 Eliminar foto</button>`;
    bind("f_pnota","input",v=>{ph.nota=v;render(true);scheduleSave();},true);
    document.getElementById("f_del").onclick=()=>{ if(ph.fotoId)fotoDel(ph.fotoId);
      doc.photos=doc.photos.filter(x=>x.id!==ph.id); setSel([]); pushHistory(); render(); };
    const box=document.getElementById("phThumb");
    const show=src=>{ box.innerHTML=""; const im=document.createElement("img");
      im.src=src; im.style.cssText="max-width:100%;border-radius:8px"; box.appendChild(im); };
    if(ph.dataInline) show(ph.dataInline);
    else if(ph.fotoId) fotoGet(ph.fotoId).then(b=>{ if(b) show(URL.createObjectURL(b)); else box.textContent="Foto no encontrada en este dispositivo"; });
    else box.textContent="Sin imagen";
  }
  else if(selected.type==="stair"){ const st=doc.stairs.find(x=>x.id===selected.id); if(!st){setSel([]);return renderInspector(p);}
    const c=stairCalc(st);
    p.innerHTML=`<div class="kdt">🪜 Escalera recta</div>
      <div class="big">${c.N} escalones</div>
      <p class="muted">Contrahuella real: <b>${c.ch.toFixed(1)} cm</b> · Huella: <b>${isFinite(c.huella)?c.huella.toFixed(1):"—"} cm</b><br>
      Blondel (2CH+H): <b>${c.blondel.toFixed(0)} cm</b> ${c.comoda?'<span style="color:var(--ok)">✔ cómoda (61–65)</span>':'<span style="color:var(--danger)">⚠ fuera de 61–65 — alargá o ajustá altura</span>'}</p>
      ${field("Largo del recorrido (cm)",`<input id="st_l" type="number" value="${Math.round(st.largo)}">`)}
      ${field("Ancho (cm)",`<input id="st_w" type="number" value="${Math.round(st.ancho)}">`)}
      ${field("Altura a subir (cm) — piso a piso",`<input id="st_h" type="number" value="${Math.round(st.alturaTotal)}">`)}
      ${field("Contrahuella máxima deseada (cm)",`<input id="st_ch" type="number" step="0.5" value="${st.chMax}">`)}
      <button id="st_inv" class="ghost" style="width:100%;justify-content:center">⇄ Invertir dirección (SUBE al revés)</button>
      <button id="f_del" class="danger" style="width:100%;justify-content:center;margin-top:8px">🗑 Eliminar escalera</button>`;
    const up=()=>{ st.largo=Math.max(60,+document.getElementById("st_l").value||st.largo);
      st.ancho=Math.max(60,+document.getElementById("st_w").value||90);
      st.alturaTotal=Math.max(100,+document.getElementById("st_h").value||270);
      st.chMax=Math.min(20,Math.max(14,+document.getElementById("st_ch").value||18));
      pushHistory(); render(); };
    ["st_l","st_w","st_h","st_ch"].forEach(id=>document.getElementById(id).onchange=up);
    document.getElementById("st_inv").onclick=()=>{ const fin=stairP(st,st.largo,0);
      st.x=fin.x; st.y=fin.y; st.ang=st.ang+Math.PI; pushHistory(); render(); };
    document.getElementById("f_del").onclick=()=>{ doc.stairs=doc.stairs.filter(x=>x.id!==st.id);
      setSel([]); pushHistory(); render(); };
  }
  else if(selected.type==="route"){ const r=doc.routes.find(x=>x.id===selected.id); if(!r){setSel([]);return renderInspector(p);}
    const cirOpts2=`<option value="">— sin circuito —</option>`+
      doc.circuits.map(c=>`<option value="${c.id}" ${r.circuitId===c.id?"selected":""}>⬤ ${c.name} · ${c.amps}A</option>`).join("");
    p.innerHTML=`<div class="kdt">〰️ Tubería / canalización</div>
      <div class="big">${fmt(routeLen(r))}</div>

// ---- eléctrico normativo: fases, caída de tensión, cédula ----
function deltaV(c){ // ΔV% = 2·K·I·L / CM / V — K=12.9 cobre, L en pies [ESTIMACIÓN]
  const awg=AWG_BY_BREAKER[c.amps];
  const CM={"#14":4110,"#12":6530,"#10":10380,"#8":16510,"#6":26240}[awg]; if(!CM) return 0;
  const V=doc.elements.some(e=>e.circuitId===c.id&&elInfo(e.type).volt===240)?240:(settings.voltaje||120);
  const I=circuitLoad(c)/V; if(!I) return 0;
  const Lft=(circuitCableM(c)/2)*3.281; // ida aproximada
  return ((2*12.9*I*Lft)/CM)/V*100; }
function faseBalance(){ let a=0,b=0;
  doc.circuits.forEach(c=>{ const va=circuitLoad(c);
    const is240=doc.elements.some(e=>e.circuitId===c.id&&elInfo(e.type).volt===240);
    if(is240){ a+=va/2; b+=va/2; } else if(c.fase==="B") b+=va; else a+=va; });
  const mx=Math.max(a,b)||1; return {a,b,des:Math.abs(a-b)/mx*100}; }
function cedulaDe(c){ if(!c) return null; // cédula de conductores [ESTIMACIÓN, THHN]
  const awg=(AWG_BY_BREAKER[c.amps]||"#12");
  const emt=c.amps>=40?'1"':(c.amps>=30?'¾"':'½"');
  return "2"+awg+"+1"+awg+"T · EMT "+emt; }

  const vaT=doc.circuits.reduce((s,c)=>s+circuitLoad(c),0);

// ---- Avisos inteligentes (guías deterministas, con reservas) ----
function distribuirTomas(l){
  const rooms=detectRooms(); const room=rooms.find(r=>pointInPoly(l,r.poly));
  if(!room){ avisar("La etiqueta debe estar DENTRO de un cuarto cerrado."); return; }
  const key=p=>Math.round(p.x)+","+Math.round(p.y);
  const setP=new Set(room.poly.map(key));
  const wallsCiclo=doc.walls.filter(w=>{ if(!enPiso(w))return false;
    const a=N(w.a),b=N(w.b); return a&&b&&setP.has(key(a))&&setP.has(key(b)); });
  const cxr=room.poly.reduce((s,q)=>s+q.x,0)/room.poly.length;
  const cyr=room.poly.reduce((s,q)=>s+q.y,0)/room.poly.length;
  let count=0; const MAXD=360, MIN_WALL=60, EDGE=30; // NEC 210.52 simplificado [ESTIMACIÓN]
  wallsCiclo.forEach(w=>{ const L=wallLen(w); if(L<MIN_WALL) return;
    const nT=Math.max(1,Math.ceil((L-2*EDGE)/MAXD));
    for(let i=0;i<nT;i++){ const d=nT===1?L/2:EDGE+(L-2*EDGE)*i/(nT-1);
      const p=wallPointAt(w,d);
      const nx=-Math.sin(p.ang), ny=Math.cos(p.ang);
      const s2=((cxr-p.x)*nx+(cyr-p.y)*ny)>=0?1:-1;
      const px=Math.round(p.x+nx*s2*14), py=Math.round(p.y+ny*s2*14);
      if(doc.elements.some(e=>(e.type==="toma"||e.type==="toma_doble"||e.type==="toma_gfci")&&Math.hypot(e.x-px,e.y-py)<60)) continue;
      doc.elements.push({id:uid("e"),type:"toma",x:px,y:py,label:"",notes:"",piso:doc.pisoActivo,circuitId:null});
      count++; } });
  if(count){ pushHistory(); render();
    avisar("⚡ "+count+" tomas colocadas por norma (≤3,6 m) — REVISALAS y asignales circuito."); }
  else avisar("No agregué tomas: ya había suficientes o las paredes son muy cortas."); }
async function numerarPuntos(){
  const conEt=doc.elements.filter(e=>e.circuitId&&e.label).length;
  let sobre=true;
  if(conEt) sobre=await pedirConfirm("Hay "+conEt+" puntos ya etiquetados.<br>¿Sobrescribir con la numeración C#-n?","🔢 Renumerar todo");
  const pp=panelPos()||{x:0,y:0}; let n=0;
  doc.circuits.forEach((c,ci)=>{ const els=doc.elements.filter(e=>e.circuitId===c.id)
    .sort((a2,b2)=>(Math.abs(a2.x-pp.x)+Math.abs(a2.y-pp.y))-(Math.abs(b2.x-pp.x)+Math.abs(b2.y-pp.y)));
    els.forEach((e,i)=>{ if(sobre||!e.label){ e.label="C"+(ci+1)+"-"+(i+1); n++; } }); });
  if(n){ pushHistory(); render(); avisar("🔢 "+n+" puntos numerados (orden: cercanía al tablero)."); }
  else avisar("Nada que numerar — asigná circuitos primero."); }
function cotasAuto(){ const rooms=detectRooms(); let added=0;
  doc.walls.forEach(w=>{ if(!enPiso(w)||w.curve) return; const a=N(w.a),b=N(w.b); if(!a||!b)return;
    const ang=angleOf(a,b); const nx=-Math.sin(ang), ny=Math.cos(ang);
    const mid=wallPointAt(w,wallLen(w)/2);
    const inA=rooms.some(r=>pointInPoly({x:mid.x+nx*20,y:mid.y+ny*20},r.poly));
    const inB=rooms.some(r=>pointInPoly({x:mid.x-nx*20,y:mid.y-ny*20},r.poly));
    if(inA===inB) return; // pared interior o suelta
    const s=inA?-1:1; const off=45;
    const A={x:a.x+nx*s*off,y:a.y+ny*s*off}, B={x:b.x+nx*s*off,y:b.y+ny*s*off};
    if(doc.dims.some(d=>enPiso(d)&&Math.hypot(d.a.x-A.x,d.a.y-A.y)<12&&Math.hypot(d.b.x-B.x,d.b.y-B.y)<12)) return;
    doc.dims.push({id:uid("d"),a:A,b:B,piso:doc.pisoActivo}); added++; });
  if(added){ pushHistory(); render(); avisar("↔ "+added+" cotas de contorno agregadas — borrá las que sobren."); }
  else avisar("No encontré contorno cerrado para acotar."); }
function calcAvisos(){
  const av=[];
  const puntos=doc.elements.filter(esElectrico);
  if(!panelPos()&&puntos.length) av.push("No hay ⚡ tablero en el plano: el cable por circuito y el unifilar no se pueden estimar.");
  const sc=puntos.filter(e=>!e.circuitId).length;
  if(sc) av.push(sc+" punto(s) sin circuito asignado — marco de selección → ⚡ asignar circuito.");
  doc.circuits.forEach(c=>{ const va=circuitLoad(c),cap=circuitCapacity(c); const n=circuitPoints(c);
    if(!n){ av.push('Circuito "'+c.name+'" sin puntos.'); return; }
    if(cap&&va/cap>=0.8) av.push('"'+c.name+'" al '+Math.round(va/cap*100)+'% de carga conectada — conviene dividirlo.');
    const t220=doc.elements.some(e=>e.circuitId===c.id&&e.type==="toma_220");
    if(t220&&doc.elements.filter(e=>e.circuitId===c.id).length>1)
      av.push('"'+c.name+'" mezcla una toma 220V con otros puntos — la 220V va en circuito DEDICADO.');
    doc.elements.filter(e=>e.circuitId===c.id&&elInfo(e.type).dedicado).forEach(eq=>{ const inf=elInfo(eq.type);
      if(doc.elements.filter(x=>x.circuitId===c.id).length>1)
        av.push('"'+inf.name+'" requiere CIRCUITO DEDICADO — está compartiendo "'+c.name+'" con otros puntos.');
      if(inf.brkAmp&&c.amps<inf.brkAmp)
        av.push('"'+inf.name+'": breaker sugerido '+(inf.brkTxt||inf.brkAmp+" A")+" — el circuito tiene "+c.amps+" A."); });
    const dvv=deltaV(c);
    if(dvv>3) av.push('"'+c.name+'": caída de tensión estimada '+dvv.toFixed(1)+'% (>3%) — subí calibre o acercá el circuito al tablero [ESTIMACIÓN].');
  });
  const fb2=faseBalance();
  if((fb2.a+fb2.b)>1500&&fb2.des>20)
    av.push("Fases desbalanceadas: A="+Math.round(fb2.a)+" VA vs B="+Math.round(fb2.b)+" VA ("+fb2.des.toFixed(0)+"%) — cambiá la fase de algún circuito en ⚡ [ESTIMACIÓN].");
  const lucesLibres=doc.elements.filter(e=>LIGHT_TYPES.includes(e.type)&&!doc.elements.some(s=>SWITCH_TYPES.includes(s.type)&&s.controla&&s.controla.includes(e.id))).length;
  if(lucesLibres) av.push(lucesLibres+" luz(es) sin apagador vinculado (🔗 en el inspector del apagador).");
  const swLibres=doc.elements.filter(e=>SWITCH_TYPES.includes(e.type)&&(!e.controla||!e.controla.length)).length;
  if(swLibres) av.push(swLibres+" apagador(es) sin luces vinculadas.");
  (doc.stairs||[]).forEach(st=>{ const c=stairCalc(st);
    if(!(c.blondel>=61&&c.blondel<=65)) av.push("Escalera de "+c.N+" escalones: Blondel "+c.blondel.toFixed(0)+" cm (ideal 61–65) — alargá el recorrido o ajustá la altura [ESTIMACIÓN].");
    if(c.huella<25) av.push("Escalera con huella de "+c.huella.toFixed(0)+" cm (<25): muy empinada — alargala o agregá descanso.");
    if(c.ch>18.5) av.push("Escalera con contrahuella "+c.ch.toFixed(1)+" cm (>18,5): incómoda/insegura."); });
  if((doc.stairs||[]).length){
    const hay3v=doc.elements.some(lz=>LIGHT_TYPES.includes(lz.type)&&
      doc.elements.filter(s2=>s2.type==="sw_3vias"&&s2.controla&&s2.controla.includes(lz.id)).length>=2);
    if(!hay3v) av.push("Hay escalera sin luz con APAGADORES DE 3 VÍAS arriba y abajo (⇅ vinculá dos apagadores de 3 vías a la misma luz)."); }
  try{ const rooms=detectRooms();
    doc.labels.forEach(l=>{ if(!/bañ|cocin|pila|lavand|exter|jard|garaj/i.test(l.text||""))return;
      const room=rooms.find(r=>pointInPoly(l,r.poly)); if(!room)return;
      const n=doc.elements.filter(e=>(e.type==="toma"||e.type==="toma_doble")&&pointInPoly(e,room.poly)).length;
      if(n) av.push('"'+l.text+'": '+n+' toma(s) común(es) en zona húmeda — el NEC pide GFCI ahí.'); });
  }catch(err){}
  return av;
}

  p.querySelectorAll("[data-cf]").forEach(s=>s.onchange=()=>{ const c=circuitOf(s.dataset.cf); if(c){c.fase=s.value;pushHistory();renderPanel();} });
  p.querySelectorAll("[data-cx]").forEach(b=>b.onclick=async ()=>{ const id=b.dataset.cx;
    if(await pedirConfirm("¿Eliminar el circuito?<br><small>Sus puntos quedan sin asignar (no se borran).</small>","🗑 Eliminar")){

}

// totales de cotización — única fuente de verdad (la usan renderCot, badge y toast)
function cotTotales(){
  const elemCount={}; doc.elements.forEach(e=>{ if(!elInfo(e.type).decorativo) elemCount[e.type]=(elemCount[e.type]||0)+1; });
  const elemCost=doc.elements.reduce((s,e)=>s+priceOf(e.type),0);
  let cableTotal=0; doc.circuits.forEach(c=>cableTotal+=circuitCableM(c));
  const cableCost=cableTotal*settings.precioCableM;
  const puntos=doc.elements.filter(esElectrico).length;
  const manoObra=puntos*settings.precioPunto;
  const tubM=doc.routes.reduce((s,r)=>s+routeLen(r)/CM_PER_M,0);
  const tubCost=tubM*(settings.precioTuboM||0);
  return {elemCount,elemCost,cableTotal,cableCost,puntos,manoObra,tubM,tubCost,
    items:doc.elements.filter(e=>!elInfo(e.type).decorativo).length,total:elemCost+cableCost+manoObra+tubCost};
}

/* ===================== 3D ===================== */
let v3d=false, orbit=35, tilt=58, z3=1, ceil=false;
const view3d=document.getElementById("view3d"), scene=document.getElementById("scene");
function toggle3d(on){ v3d=on;
  document.getElementById("t3d").classList.toggle("on",on);
  document.getElementById("t2d").classList.toggle("on",!on);
  view3d.style.display=on?"block":"none";
  document.getElementById("v3dctrl").style.display=on?"flex":"none";
  if(on){ build3d(); aplicarXray(); } }
function render3dIf(){ if(v3d) build3d(); }
function center3d(){ const ns=Object.values(doc.nodes); if(!ns.length)return{cx:0,cy:0};
  let mx=0,my=0; ns.forEach(n=>{mx+=n.x;my+=n.y;}); return {cx:mx/ns.length,cy:my/ns.length}; }
function build3d(){
  scene.innerHTML=""; const {cx,cy}=center3d(); const H=settings.wallH;
  const pisosArr=(doc.pisos&&doc.pisos.length?doc.pisos:[{id:"p1",nombre:""}]);
  const zDe=pid=>{ const i=pisosArr.findIndex(p=>p.id===(pid||"p1")); return (i<0?0:i)*(H+40); };
  scene.style.transform=`translate(-50%,-50%) rotateX(${tilt}deg) rotateZ(${orbit}deg) scale3d(${z3},${z3},${z3})`;
  // piso
  const ns=Object.values(doc.nodes); let minx=-300,miny=-300,maxx=300,maxy=300;
  if(ns.length){ minx=1e9;miny=1e9;maxx=-1e9;maxy=-1e9; ns.forEach(n=>{minx=Math.min(minx,n.x);miny=Math.min(miny,n.y);maxx=Math.max(maxx,n.x);maxy=Math.max(maxy,n.y);});
    minx-=100;miny-=100;maxx+=100;maxy+=100; }
  pisosArr.forEach((pp,pi)=>{ const zo=pi*(H+40);
    const fl=document.createElement("div"); fl.className="p3 floor";
    fl.style.width=(maxx-minx)+"px"; fl.style.height=(maxy-miny)+"px";
    fl.style.left="0"; fl.style.top="0";
    fl.style.backgroundColor="rgba(120,170,230,"+(0.04+pi*0.03)+")";
    fl.style.transform=`translate3d(${minx-cx}px,${miny-cy}px,${zo}px)`;
    scene.appendChild(fl);
    if(ceil){ const c2=fl.cloneNode(); c2.className="p3 ceil";
      c2.style.transform=`translate3d(${minx-cx}px,${miny-cy}px,${zo+H}px)`; scene.appendChild(c2); } });
  // paredes
  const mkSlab=(x,y,z,len,hei,angDeg,cls,color)=>{ if(len<0.5||hei<0.5)return;
    const d=document.createElement("div"); d.className="p3 "+(cls||"wall3d");
    d.style.width=len+"px"; d.style.height=hei+"px";
    d.style.left="0"; d.style.top="0"; d.style.transformOrigin="0 0";
    if(color) d.style.background=color;
    d.style.transform="translate3d("+(x-cx)+"px,"+(y-cy)+"px,"+z+"px) rotateZ("+angDeg+"deg) rotateX(90deg)";
    scene.appendChild(d); };
  doc.walls.forEach(w=>{ const a=N(w.a),b=N(w.b); if(!a||!b)return;
    const zo=zDe(w.piso); const col=wallColor3d(w);
    if(w.curve){ // curvas: sólidas por segmentos (aberturas en curvas quedan v2)
      const pts=wallPts(w,12);
      for(let i=1;i<pts.length;i++){ const p0=pts[i-1],p1=pts[i];
        const L2=Math.hypot(p1.x-p0.x,p1.y-p0.y); if(L2<0.5)continue;
        mkSlab(p0.x,p0.y,zo,L2+1.5,H,Math.atan2(p1.y-p0.y,p1.x-p0.x)*180/Math.PI,"wall3d",col); }
      return; }
    // rectas: partidas por sus aberturas (dintel / antepecho / vidrio / hoja)
    const L=dist(a,b); const ang=angleOf(a,b); const angD=ang*180/Math.PI;
    const ux=Math.cos(ang), uy=Math.sin(ang);
    const DOOR_H=Math.min(210,H), WA=Math.min(90,H-10), WB=Math.min(210,H); // [SUPOSICIÓN v1: puerta 2.10 · ventana 0.90–2.10]
    const ops=doc.openings.filter(o=>o.wallId===w.id).map(o=>{
      const width=Math.min(o.width,L-4); const margin=width/2+2;
      const dd=Math.max(margin,Math.min(o.d!=null?o.d:L/2,L-margin));
      return {a:dd-width/2,b:dd+width/2,kind:o.kind,width:width,flip:o.flip,swing:o.swing}; })
      .sort((p,q)=>p.a-q.a);
    let cur=0;
    const seg=(d0,d1,z0,z1,cls,cl2)=>mkSlab(a.x+ux*d0,a.y+uy*d0,zo+z0,d1-d0,z1-z0,angD,cls,cl2);
    ops.forEach(o=>{ const oa=Math.max(cur,o.a), ob=Math.max(oa,o.b);
      if(oa>cur) seg(cur,oa,0,H,null,col);
      if(o.kind==="door"){
        seg(oa,ob,DOOR_H,H,null,col); // dintel
        const hd=o.swing?ob:oa;
        const base=o.swing?angD+180:angD;
        const leafAng=base+(o.flip?-1:1)*22;
        mkSlab(a.x+ux*hd,a.y+uy*hd,zo,o.width,DOOR_H,leafAng,"door3d");
      } else {
        seg(oa,ob,0,WA,null,col);      // antepecho
        seg(oa,ob,WB,H,null,col);      // dintel
        seg(oa,ob,WA,WB,"glass3d");    // vidrio
      }
      cur=Math.max(cur,ob); });
    if(cur<L) seg(cur,L,0,H,null,col);
  });
  // escaleras 3D: escalones reales que conectan las plantas
  (doc.stairs||[]).forEach(st=>{ const c=stairCalc(st); const zo=zDe(st.piso);
    const dg=st.ang*180/Math.PI; const hw=st.ancho/2;
    for(let i=0;i<c.N;i++){ const d0=i*c.huella; if(d0>st.largo)break;
      const hgt=c.ch*(i+1); const org=stairP(st,d0,-hw);
      const prof=Math.min(c.huella,st.largo-d0)+0.5;
      // pisada (horizontal)
      const tread=document.createElement("div"); tread.className="p3 step3d";
      tread.style.width=prof+"px"; tread.style.height=st.ancho+"px";
      tread.style.left="0"; tread.style.top="0"; tread.style.transformOrigin="0 0";
      tread.style.transform="translate3d("+(org.x-cx)+"px,"+(org.y-cy)+"px,"+(zo+hgt)+"px) rotateZ("+dg+"deg)";
      scene.appendChild(tread);
      // contrahuella (vertical)
      const ris=document.createElement("div"); ris.className="p3 riser3d";
      ris.style.width=st.ancho+"px"; ris.style.height=c.ch+"px";
      ris.style.left="0"; ris.style.top="0"; ris.style.transformOrigin="0 0";
      ris.style.transform="translate3d("+(org.x-cx)+"px,"+(org.y-cy)+"px,"+(zo+hgt-c.ch)+"px) rotateZ("+(dg+90)+"deg) rotateX(90deg)";
      scene.appendChild(ris);
    } });
  // símbolos billboard
  doc.elements.forEach(e=>{ const info=ELEMENTS[e.type]; if(!info) return; const hang=HANGING.includes(e.type);
    const wrap=document.createElement("div"); wrap.className="p3";
    const zc=(hang?H:alturaOf(e))+zDe(e.piso);
    wrap.style.left="0";wrap.style.top="0";
    wrap.style.transform=`translate3d(${e.x-cx}px,${e.y-cy}px,${zc}px) rotateZ(${-orbit}deg) rotateX(${-tilt}deg)`;
    if(hang && ceil){ const cable=document.createElement("div"); cable.className="cable";
      cable.style.height="0";/*cable dentro del sprite abajo*/ }

// interacción 3D
let o3=null;
view3d.addEventListener("pointerdown",e=>{ o3={x:e.clientX,y:e.clientY,or:orbit,ti:tilt}; view3d.style.cursor="grabbing"; });
window.addEventListener("pointermove",e=>{ if(!o3)return; orbit=o3.or+(e.clientX-o3.x)*0.4;
  tilt=Math.max(8,Math.min(88,o3.ti-(e.clientY-o3.y)*0.3)); build3d(); });
window.addEventListener("pointerup",()=>{ if(o3){o3=null;view3d.style.cursor="grab";} });
view3d.addEventListener("wheel",e=>{ e.preventDefault(); z3=Math.max(0.35,Math.min(2.5,z3*(e.deltaY<0?1.1:0.9))); build3d(); },{passive:false});
// pellizco táctil en 3D (dos dedos = zoom); un dedo sigue orbitando
const tp3=new Map(); let p3=null;
view3d.addEventListener("pointerdown",e=>{ if(e.pointerType!=="touch")return;
  tp3.set(e.pointerId,{x:e.clientX,y:e.clientY});
  try{ view3d.setPointerCapture(e.pointerId); }catch(_){}
  if(tp3.size===2){ o3=null; view3d.style.cursor="grab";
    const v=[...tp3.values()];
    p3={d0:Math.max(1,Math.hypot(v[0].x-v[1].x,v[0].y-v[1].y)),z0:z3}; }
},true);
view3d.addEventListener("pointermove",e=>{ if(e.pointerType!=="touch"||!tp3.has(e.pointerId))return;
  tp3.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(p3&&tp3.size>=2){ const v=[...tp3.values()];
    const d=Math.max(1,Math.hypot(v[0].x-v[1].x,v[0].y-v[1].y));
    z3=Math.max(0.35,Math.min(2.5,p3.z0*(d/p3.d0))); build3d();
    e.stopPropagation(); e.preventDefault(); }
},{capture:true,passive:false});
function end3(e){ if(e.pointerType!=="touch")return;
  tp3.delete(e.pointerId); if(tp3.size<2) p3=null; }
window.addEventListener("pointerup",end3,true);
window.addEventListener("pointercancel",end3,true);

  const m=uiModal('<div class="kdt" style="margin-bottom:10px">'+titulo+'</div>'+
    '<input id="uiIn" type="'+(tipo||"text")+'" value="'+String(def!=null?def:"").replace(/"/g,"&quot;")+'" style="width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:7px;color:var(--ink);padding:9px;font-size:14px">'+

function loadBlocks(){ try{ return JSON.parse(lsGet("planelectrico:blocks"))||[]; }catch(e){ return []; } }

async function guardarBloque(){ if(!selection.length){ avisar("Seleccioná lo que querés guardar como bloque."); return; }
  const nombre=await pedir("📦 Nombre del bloque (ej: Baño completo):","Bloque "+(loadBlocks().length+1));
  if(nombre==null) return;
  const c=selCentro()||{x:0,y:0};
  const rel=p=>({x:Math.round(p.x-c.x),y:Math.round(p.y-c.y)});
  const B={nombre:nombre,walls:[],nodes:{},openings:[],elements:[],labels:[],routes:[],stairs:[],dims:[],texts:[]};
  const nodeMap={}; let ni=0;
  selection.forEach(s=>{ if(s.type!=="wall")return; const w=doc.walls.find(x=>x.id===s.id); if(!w)return;
    [w.a,w.b].forEach(id=>{ if(!nodeMap[id]){ nodeMap[id]="n"+(ni++); B.nodes[nodeMap[id]]=rel(N(id)); } });
    const wi=B.walls.length;
    B.walls.push({a:nodeMap[w.a],b:nodeMap[w.b],curve:w.curve||0,material:w.material,color:w.color,name:w.name});
    doc.openings.filter(o=>o.wallId===w.id).forEach(o=>B.openings.push({wi:wi,d:o.d,width:o.width,kind:o.kind,flip:o.flip,swing:o.swing})); });
  selection.forEach(s=>{
    if(s.type==="element"){ const e=doc.elements.find(x=>x.id===s.id);
      if(e){ const p=rel(e); B.elements.push({x:p.x,y:p.y,type:e.type,label:e.label,alturaCm:e.alturaCm}); } }
    else if(s.type==="label"){ const l=doc.labels.find(x=>x.id===s.id);
      if(l){ const p=rel(l); B.labels.push({x:p.x,y:p.y,text:l.text}); } }
    else if(s.type==="route"){ const r=doc.routes.find(x=>x.id===s.id);
      if(r) B.routes.push({pts:r.pts.map(rel)}); }
    else if(s.type==="stair"){ const st=doc.stairs.find(x=>x.id===s.id);
      if(st){ const p=rel(st); B.stairs.push({x:p.x,y:p.y,ang:st.ang,largo:st.largo,ancho:st.ancho,alturaTotal:st.alturaTotal,chMax:st.chMax}); } }
    else if(s.type==="dim"){ const d=doc.dims.find(x=>x.id===s.id);
      if(d) B.dims.push({a:rel(d.a),b:rel(d.b)}); }
    else if(s.type==="text"){ const t=(doc.texts||[]).find(x=>x.id===s.id);
      if(t){ const p=rel(t); B.texts.push({x:p.x,y:p.y,text:t.text,font:t.font,size:t.size,color:t.color}); } } });
  const bs=loadBlocks(); bs.push(B); saveBlocks(bs);
  avisar('📦 "'+nombre+'" guardado — insertalo con el botón 📦 en CUALQUIER proyecto.'); }
function insertarBloque(B){
  const cx0=Math.round(vb.x+vb.w/2), cy0=Math.round(vb.y+vb.h/2);
  const abs=p=>({x:p.x+cx0,y:p.y+cy0});
  const idMap={}; const newSel=[]; const wallIds=[];
  Object.keys(B.nodes||{}).forEach(k=>{ const id=uid("n"); const p=abs(B.nodes[k]);
    doc.nodes[id]={x:p.x,y:p.y}; idMap[k]=id; });
  (B.walls||[]).forEach(w=>{ const id=uid("w");
    doc.walls.push({id:id,a:idMap[w.a],b:idMap[w.b],curve:w.curve||0,material:w.material||"Ladrillo",
      color:w.color,name:w.name||"",space:"",piso:doc.pisoActivo});
    wallIds.push(id); newSel.push({type:"wall",id:id}); });
  (B.openings||[]).forEach(o=>{ const wid=wallIds[o.wi];
    if(wid) doc.openings.push({id:uid("o"),wallId:wid,d:o.d,width:o.width,kind:o.kind,flip:o.flip,swing:o.swing}); });
  (B.elements||[]).forEach(e=>{ const id=uid("e"); const p=abs(e);
    doc.elements.push({id:id,type:e.type,x:p.x,y:p.y,label:e.label||"",notes:"",alturaCm:e.alturaCm,
      circuitId:null,piso:doc.pisoActivo}); newSel.push({type:"element",id:id}); });
  (B.labels||[]).forEach(l=>{ const id=uid("l"); const p=abs(l);
    doc.labels.push({id:id,x:p.x,y:p.y,text:l.text||"Espacio",piso:doc.pisoActivo});
    newSel.push({type:"label",id:id}); });
  (B.texts||[]).forEach(t=>{ const id=uid("tx"); const p=abs(t);
    doc.texts.push({id:id,x:p.x,y:p.y,text:t.text||"Texto",font:t.font||"sistema",size:t.size||40,color:t.color||"#dbe6f5",piso:doc.pisoActivo});
    newSel.push({type:"text",id:id}); });
  (B.routes||[]).forEach(r=>{ const id=uid("r");
    doc.routes.push({id:id,circuitId:null,pts:r.pts.map(abs),piso:doc.pisoActivo});
    newSel.push({type:"route",id:id}); });
  (B.stairs||[]).forEach(st=>{ const id=uid("st"); const p=abs(st);
    doc.stairs.push({id:id,x:p.x,y:p.y,ang:st.ang,largo:st.largo,ancho:st.ancho,
      alturaTotal:st.alturaTotal,chMax:st.chMax,piso:doc.pisoActivo});
    newSel.push({type:"stair",id:id}); });
  (B.dims||[]).forEach(d=>{ doc.dims.push({id:uid("d"),a:abs(d.a),b:abs(d.b),piso:doc.pisoActivo}); });
  setSel(newSel); pushHistory(); render();
  avisar('📦 "'+B.nombre+'" insertado al centro de la vista — movelo con arrastre o flechas.'); }

      dp.prompt(); const r=await dp.userChoice;
      if(r && r.outcome==="accepted") avisar("¡Listo! La app se está instalando 📲");
      actualizarBotonDescargar(); return; }
    const iOS=/iphone|ipad|ipod/i.test(navigator.userAgent)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);

    else { avisar("Para instalar: abrí el menú del navegador (⋮) y elegí «Instalar app», o usá el ícono ⊕ de la barra de direcciones."); }

/* ===== Arrastre de fichas desde la bandeja (estilo Duolingo) ===== */
let dragFicha=null; // {cat,btn,id,x0,y0,activo}
const GH_OFF=36;    // el ghost va 36px sobre el dedo/cursor para que se vea el punto de caída
function ghostEl(){ return document.getElementById("dragGhost"); }
function mostrarGhost(cat){ const g=ghostEl();
  const et=(settings.varByCat[cat]&&CATS[cat].includes(settings.varByCat[cat]))?settings.varByCat[cat]:CATS[cat][0];
  const i=elInfo(et);
  g.innerHTML=`<span class="ic">${i.icon}</span><span>${i.name.split(" ")[0]}</span>`;
  g.className=""; g.style.display="flex"; }
function moverGhost(ev){ const g=ghostEl();
  g.style.left=ev.clientX+"px"; g.style.top=(ev.clientY-GH_OFF)+"px";
  const bajo=document.elementFromPoint(ev.clientX,Math.max(0,ev.clientY-GH_OFF));
  const sobre=!!(bajo&&(bajo===svg||svg.contains(bajo)));
  g.classList.toggle("sobre",sobre);
  if(sobre){ const w=toWorld({clientX:ev.clientX,clientY:ev.clientY-GH_OFF});
    hoverSnap={x:snapNum(w.x),y:snapNum(w.y)}; render(true); }
  else if(hoverSnap){ hoverSnap=null; render(true); } }
function soltarFicha(ev,cancelado){
  const df=dragFicha; dragFicha=null; if(!df) return;
  if(df.scroll){ df.btn.__suprimeClick=true; return; } // fue scroll manual de la bandeja
  if(!df.activo) return; // tap simple → click normal
  df.btn.__suprimeClick=true;
  const g=ghostEl();
  const bajo=document.elementFromPoint(ev.clientX,Math.max(0,ev.clientY-GH_OFF));
  if(!cancelado&&bajo&&(bajo===svg||svg.contains(bajo))){
    const w=toWorld({clientX:ev.clientX,clientY:ev.clientY-GH_OFF});
    hoverSnap=null; colocarElemento(df.cat,{x:snapNum(w.x),y:snapNum(w.y)});
    try{ navigator.vibrate&&navigator.vibrate(12); }catch(e){}
    g.classList.add("suelta"); setTimeout(()=>{ g.style.display="none"; g.className=""; },160);
  } else { // regresa a la bandeja (cancelación clara)
    const r=df.btn.getBoundingClientRect();
    g.classList.add("vuelve");
    g.style.left=(r.left+r.width/2)+"px"; g.style.top=(r.top+r.height/2)+"px";
    hoverSnap=null; render(true);
    setTimeout(()=>{ g.style.display="none"; g.className=""; },200); } }
function activarDragFicha(btn,cat){
  btn.classList.add("ficha");
  btn.addEventListener("pointerdown",ev=>{
    dragFicha={cat,btn,id:ev.pointerId,x0:ev.clientX,y0:ev.clientY,activo:false};
    try{ btn.setPointerCapture(ev.pointerId); }catch(e){} });
  btn.addEventListener("pointermove",ev=>{
    if(!dragFicha||dragFicha.id!==ev.pointerId) return;
    if(dragFicha.scroll){ // bandeja móvil: el scroll ya no es nativo (touch-action:none), lo hacemos aquí
      const rl=document.getElementById("rail"); rl.scrollLeft+=dragFicha.lx-ev.clientX; dragFicha.lx=ev.clientX; return; }
    if(!dragFicha.activo){
      const dx=ev.clientX-dragFicha.x0, dy=ev.clientY-dragFicha.y0;
      if(Math.hypot(dx,dy)<10) return;
      if(document.body.classList.contains("mobile")&&Math.abs(dx)>Math.abs(dy)){
        dragFicha.scroll=true; dragFicha.lx=ev.clientX; return; } // horizontal = desplazar la bandeja
      dragFicha.activo=true; mostrarGhost(cat);
      try{ navigator.vibrate&&navigator.vibrate(8); }catch(e){} }
    ev.preventDefault(); moverGhost(ev); });
  btn.addEventListener("pointerup",ev=>soltarFicha(ev,false));
  btn.addEventListener("pointercancel",ev=>soltarFicha(ev,true)); }

function mostrarTipSimbolo(tile){
  if(window.matchMedia&&!matchMedia("(hover:hover)").matches) return; // solo con mouse real, nunca en táctil
  const t=document.getElementById("tip"); if(!t||!tile) return;
  const k=tile.dataset.sym, i=ELEMENTS[k]; if(!i) return;
  const pr=priceOf(k), precio=pr>0?` · <span style="color:var(--soft)">${mon(pr)}</span>`:"";
  const desc=SYMDESC[k]?`<br><span style="color:var(--soft)">${SYMDESC[k]}</span>`:"";
  t.innerHTML=`<b>${i.icon} ${i.name}</b>${precio}${desc}`;
  t.style.display="block";
  const rb=tile.getBoundingClientRect(), rt=t.getBoundingClientRect();
  let x=rb.left-rt.width-10, y=rb.top+rb.height/2-rt.height/2; // panel a la derecha: el tip va a la IZQUIERDA de la ficha
  if(x<8) x=rb.right+10; // si no cabe a la izquierda, salta a la derecha
  y=Math.max(8,Math.min(y,window.innerHeight-rt.height-8));
  t.style.left=x+"px"; t.style.top=y+"px";
}
function mostrarTipBarra(btn){
  if(window.matchMedia&&!matchMedia("(hover:hover)").matches) return; // solo con mouse real, nunca en táctil
  const t=document.getElementById("tip"), d=TIPS[btn.dataset.tool]; if(!t||!d) return;
  const kbd=d[2]?` <span style="border:1px solid var(--line2);border-radius:4px;padding:0 5px;font-family:var(--mono);font-size:10px;opacity:.85">${d[2]}</span>`:"";
  t.innerHTML=`<b>${d[0]}</b>${kbd}<br><span style="color:var(--soft)">${d[1]}</span>`;
  t.style.display="block";
  const rb=btn.getBoundingClientRect(), rt=t.getBoundingClientRect();
  let x=rb.right+10, y=rb.top+rb.height/2-rt.height/2;
  if(x+rt.width>window.innerWidth-8) x=rb.left-rt.width-10; // si no cabe a la derecha, va a la izquierda
  y=Math.max(8,Math.min(y,window.innerHeight-rt.height-8));
  t.style.left=x+"px"; t.style.top=y+"px";
}

function exportDXF(){
  // DXF R12 mínimo (sección ENTITIES) — coordenadas en cm, Y invertida (CAD usa Y hacia arriba)
  let s="999\nPlanElectrico Pro - unidades: centimetros - piso: "+(((doc.pisos||[]).find(p=>p.id===doc.pisoActivo)||{}).nombre||"Planta 1")+"\n0\nSECTION\n2\nENTITIES\n";
  const X=x=>(+x).toFixed(2), Y=y=>(-y).toFixed(2);
  const line=(x1,y1,x2,y2,layer)=>{ s+="0\nLINE\n8\n"+layer+"\n10\n"+X(x1)+"\n20\n"+Y(y1)+"\n11\n"+X(x2)+"\n21\n"+Y(y2)+"\n"; };
  const circle=(x,y,r,layer)=>{ s+="0\nCIRCLE\n8\n"+layer+"\n10\n"+X(x)+"\n20\n"+Y(y)+"\n40\n"+(+r).toFixed(2)+"\n"; };
  const text=(x,y,h,txt,layer)=>{ s+="0\nTEXT\n8\n"+layer+"\n10\n"+X(x)+"\n20\n"+Y(y)+"\n40\n"+(+h).toFixed(2)+"\n1\n"+String(txt).replace(/[\r\n]+/g," ")+"\n"; };
  const poly=(pts,layer)=>{ s+="0\nPOLYLINE\n8\n"+layer+"\n66\n1\n70\n0\n";
    pts.forEach(p=>{ s+="0\nVERTEX\n8\n"+layer+"\n10\n"+X(p.x)+"\n20\n"+Y(p.y)+"\n"; });
    s+="0\nSEQEND\n"; };
  doc.walls.forEach(w=>{ if(!enPiso(w))return; const a=N(w.a),b=N(w.b); if(!a||!b)return;
    if(w.curve) poly(wallPts(w,16),"PAREDES"); else line(a.x,a.y,b.x,b.y,"PAREDES");
    const L=wallLen(w); const mp=wallPointAt(w,L/2);
    text(mp.x,mp.y-12,10,fmt(L),"TEXTOS"); });
  doc.openings.forEach(o=>{ const w=doc.walls.find(x=>x.id===o.wallId); if(!w||!enPiso(w))return;
    const L=wallLen(w); const dpos=Math.max(o.width/2,Math.min(o.d!=null?o.d:L/2,L-o.width/2));
    const p1=wallPointAt(w,dpos-o.width/2), p2=wallPointAt(w,dpos+o.width/2);
    line(p1.x,p1.y,p2.x,p2.y,"APERTURAS");
    text((p1.x+p2.x)/2,(p1.y+p2.y)/2-10,8,(o.kind==="door"?"PUERTA ":"VENTANA ")+Math.round(o.width)+"cm","APERTURAS"); });
  doc.elements.forEach(e=>{ if(!enPiso(e))return;
    circle(e.x,e.y,12,"ELECTRICO");
    text(e.x+16,e.y+4,9,elInfo(e.type).name+(e.label?" "+e.label:""),"ELECTRICO"); });
  doc.routes.forEach(r=>{ if(!enPiso(r)||!r.pts||r.pts.length<2)return; poly(r.pts,"TUBERIA");
    const mid=r.pts[Math.floor(r.pts.length/2)];
    text(mid.x,mid.y-10,8,"TUBO "+fmt(routeLen(r))+(r.circuitId?" "+(cedulaDe(circuitOf(r.circuitId))||""):""),"TUBERIA"); });
  doc.dims.forEach(d0=>{ if(!enPiso(d0))return; line(d0.a.x,d0.a.y,d0.b.x,d0.b.y,"COTAS");
    text((d0.a.x+d0.b.x)/2,(d0.a.y+d0.b.y)/2-10,9,fmt(dist(d0.a,d0.b)),"COTAS"); });
  doc.labels.forEach(l=>{ if(!enPiso(l))return; text(l.x,l.y,14,l.text||"","TEXTOS"); });
  (doc.texts||[]).forEach(t=>{ if(!enPiso(t))return; text(t.x,t.y,Math.max(8,t.size||40),t.text||"","TEXTOS"); });
  (doc.stairs||[]).forEach(st=>{ if(!enPiso(st))return; const c=stairCalc(st); const hw=st.ancho/2;
    const p1=stairP(st,0,-hw),p2=stairP(st,st.largo,-hw),p3=stairP(st,st.largo,hw),p4=stairP(st,0,hw);
    poly([p1,p2,p3,p4,p1],"ESCALERA");
    for(let i=1;i<c.N;i++){ const d0=i*c.huella; if(d0>=st.largo)break;
      const q1=stairP(st,d0,-hw),q2=stairP(st,d0,hw); line(q1.x,q1.y,q2.x,q2.y,"ESCALERA"); }
    const mp=stairP(st,st.largo/2,0); text(mp.x,mp.y,10,"SUBE "+c.N+" ESC","ESCALERA"); });
  s+="0\nENDSEC\n0\nEOF\n";
  download((projectName||"plano").replace(/[^\wáéíóúñÁÉÍÓÚÑ -]/g,"")+".dxf","application/dxf",s);
}

function decorarPlano(sc,vb){
  const u=vb.w/100; const g=el("g",{});
  // flecha de norte (arriba-izquierda)
  const nx=vb.x+u*5, ny=vb.y+u*7;
  g.appendChild(el("path",{d:`M ${nx} ${ny-u*3.2} L ${nx-u*1.4} ${ny+u*1.4} L ${nx} ${ny+u*0.5} L ${nx+u*1.4} ${ny+u*1.4} Z`,fill:"var(--ink)"}));
  const tN=el("text",{x:nx,y:ny+u*3.6,"font-size":u*2,"text-anchor":"middle",fill:"var(--ink)","font-weight":"700",style:"font-family:var(--mono)"});
  tN.textContent="N"; g.appendChild(tN);
  // escala gráfica (abajo-izquierda)
  const cand=[50,100,200,300,500,1000]; let bar=cand[0],best=1e9;
  cand.forEach(c=>{ const d=Math.abs(c-vb.w*0.18); if(d<best){best=d;bar=c;} });
  const seg=bar/4, bx=vb.x+u*4, by=vb.y+vb.h-u*5.5, bh=u*1.3;
  for(let i=0;i<4;i++) g.appendChild(el("rect",{x:bx+seg*i,y:by,width:seg,height:bh,
    fill:i%2?"var(--ink)":"none",stroke:"var(--ink)","stroke-width":u*0.15}));
  const t0=el("text",{x:bx,y:by-u*0.9,"font-size":u*1.6,fill:"var(--ink)",style:"font-family:var(--mono)"});
  t0.textContent="0"; g.appendChild(t0);
  const t1=el("text",{x:bx+bar,y:by-u*0.9,"font-size":u*1.6,"text-anchor":"end",fill:"var(--ink)",style:"font-family:var(--mono)"});
  t1.textContent=bar>=100?(bar/100)+" m":bar+" cm"; g.appendChild(t1);
  sc.appendChild(g);
}

function selCentro(){ let sx=0,sy=0,n=0;
  selNodosUnicos().forEach(id=>{ const nd=doc.nodes[id]; if(nd){sx+=nd.x;sy+=nd.y;n++;} });
  selection.forEach(s=>{ const grab=o=>{sx+=o.x;sy+=o.y;n++;};
    if(s.type==="element"){const e=doc.elements.find(x=>x.id===s.id); if(e)grab(e);}
    else if(s.type==="text"){const t=(doc.texts||[]).find(x=>x.id===s.id); if(t)grab(t);}
    else if(s.type==="label"){const l=doc.labels.find(x=>x.id===s.id); if(l)grab(l);}
    else if(s.type==="photo"){const f=doc.photos.find(x=>x.id===s.id); if(f)grab(f);}
    else if(s.type==="stair"){const st=doc.stairs.find(x=>x.id===s.id); if(st)grab(stairP(st,st.largo/2,0));}
    else if(s.type==="route"){const r=doc.routes.find(x=>x.id===s.id); if(r)r.pts.forEach(grab);}
    else if(s.type==="dim"){const d=doc.dims.find(x=>x.id===s.id); if(d){grab(d.a);grab(d.b);}} });
  return n?{x:sx/n,y:sy/n}:null; }
function transSel(pt,opts){ opts=opts||{};
  selNodosUnicos().forEach(id=>{ const nd=doc.nodes[id]; if(nd){ const p=pt(nd); nd.x=p.x; nd.y=p.y; } });
  selection.forEach(s=>{
    if(s.type==="wall"&&opts.flipCurve){ const w=doc.walls.find(x=>x.id===s.id); if(w&&w.curve)w.curve=-w.curve; }
    else if(s.type==="element"){ const e=doc.elements.find(x=>x.id===s.id); if(e){const p=pt(e);e.x=p.x;e.y=p.y;} }
    else if(s.type==="label"){ const l=doc.labels.find(x=>x.id===s.id); if(l){const p=pt(l);l.x=p.x;l.y=p.y;} }
    else if(s.type==="text"){ const t=(doc.texts||[]).find(x=>x.id===s.id); if(t){const p=pt(t);t.x=p.x;t.y=p.y;} }
    else if(s.type==="photo"){ const f=doc.photos.find(x=>x.id===s.id); if(f){const p=pt(f);f.x=p.x;f.y=p.y;} }
    else if(s.type==="route"){ const r=doc.routes.find(x=>x.id===s.id); if(r)r.pts=r.pts.map(p=>{const q=pt(p);return{x:q.x,y:q.y};}); }
    else if(s.type==="dim"){ const d=doc.dims.find(x=>x.id===s.id); if(d){const qa=pt(d.a),qb=pt(d.b);d.a={x:qa.x,y:qa.y};d.b={x:qb.x,y:qb.y};} }
    else if(s.type==="stair"){ const st=doc.stairs.find(x=>x.id===s.id);
      if(st){ const p=pt({x:st.x,y:st.y}); st.x=p.x; st.y=p.y; if(opts.ang)st.ang=opts.ang(st.ang); } } });
  pushHistory(); render(); }
function mirrorSelection(){ const c=selCentro(); if(!c){ avisar("Seleccioná algo para reflejar."); return; }
  transSel(p=>({x:Math.round(2*c.x-p.x),y:p.y}),{flipCurve:true,ang:a=>Math.PI-a});
  avisar("⇋ Espejo aplicado — ideal para apartamentos espejados."); }
async function rotateSelection(deg){ const c=selCentro(); if(!c){ avisar("Seleccioná algo para rotar."); return; }
  if(deg==null){ const v=await pedir("∠ Ángulo de rotación (grados):","90","number"); if(v==null)return; deg=+v||0; }
  const th=deg*Math.PI/180; const cos=Math.cos(th),sin=Math.sin(th);
  transSel(p=>({x:Math.round(c.x+(p.x-c.x)*cos-(p.y-c.y)*sin),y:Math.round(c.y+(p.x-c.x)*sin+(p.y-c.y)*cos)}),{ang:a=>a+th});
  avisar("⟳ Rotado "+deg+"°."); }
let nudgeTimer=null;
function nudgeSelection(dx,dy){ if(!selection.length) return;
  selNodosUnicos().forEach(id=>{ const nd=doc.nodes[id]; if(nd){ nd.x+=dx; nd.y+=dy; } });
  selection.forEach(s=>{
    if(s.type==="element"){ const e=doc.elements.find(x=>x.id===s.id); if(e){e.x+=dx;e.y+=dy;} }
    else if(s.type==="text"){ const t=(doc.texts||[]).find(x=>x.id===s.id); if(t){t.x+=dx;t.y+=dy;} }
    else if(s.type==="label"){ const l=doc.labels.find(x=>x.id===s.id); if(l){l.x+=dx;l.y+=dy;} }
    else if(s.type==="photo"){ const f=doc.photos.find(x=>x.id===s.id); if(f){f.x+=dx;f.y+=dy;} }
    else if(s.type==="stair"){ const st=doc.stairs.find(x=>x.id===s.id); if(st){st.x+=dx;st.y+=dy;} }
    else if(s.type==="route"){ const r=doc.routes.find(x=>x.id===s.id); if(r)r.pts.forEach(p=>{p.x+=dx;p.y+=dy;}); }
    else if(s.type==="dim"){ const d=doc.dims.find(x=>x.id===s.id); if(d){d.a.x+=dx;d.a.y+=dy;d.b.x+=dx;d.b.y+=dy;} } });
  clearTimeout(nudgeTimer); nudgeTimer=setTimeout(()=>pushHistory(),450);
  render(true); }
function duplicateSelection(){ if(!selection.length) return;
  const OFF=40; const nodeMap={}; const newSel=[]; const elMap={};
  const selWalls=selection.filter(s=>s.type==="wall").map(s=>doc.walls.find(w=>w.id===s.id)).filter(Boolean);
  selWalls.forEach(w=>{ [w.a,w.b].forEach(nid=>{ if(!nodeMap[nid]){ const n=N(nid);
    const id2=uid("n"); doc.nodes[id2]={x:n.x+OFF,y:n.y+OFF}; nodeMap[nid]=id2; } }); });
  selWalls.forEach(w=>{ const id2=uid("w");
    doc.walls.push(Object.assign({},w,{id:id2,a:nodeMap[w.a],b:nodeMap[w.b]}));
    newSel.push({type:"wall",id:id2});
    doc.openings.filter(o=>o.wallId===w.id).forEach(o=>{
      doc.openings.push(Object.assign({},o,{id:uid("o"),wallId:id2})); }); });
  selection.filter(s=>s.type==="element").forEach(s=>{ const e=doc.elements.find(x=>x.id===s.id);
    if(e){ const id2=uid("e"); const cp=Object.assign({},e,{id:id2,x:e.x+OFF,y:e.y+OFF});
      if(e.controla) cp.controla=e.controla.slice();
      elMap[e.id]=id2; doc.elements.push(cp);
      newSel.push({type:"element",id:id2}); } });
  // remapear vínculos apagador→luz dentro de la copia
  Object.values(elMap).forEach(nid=>{ const ne=doc.elements.find(x=>x.id===nid);
    if(ne&&ne.controla) ne.controla=ne.controla.map(id=>elMap[id]||id); });
  selection.filter(s=>s.type==="stair").forEach(s=>{ const st=doc.stairs.find(x=>x.id===s.id);
    if(st){ const id2=uid("st"); doc.stairs.push(Object.assign({},st,{id:id2,x:st.x+OFF,y:st.y+OFF}));
      newSel.push({type:"stair",id:id2}); } });
  selection.filter(s=>s.type==="label").forEach(s=>{ const l=doc.labels.find(x=>x.id===s.id);
    if(l){ const id2=uid("l"); doc.labels.push(Object.assign({},l,{id:id2,x:l.x+OFF,y:l.y+OFF}));
      newSel.push({type:"label",id:id2}); } });
  selection.filter(s=>s.type==="text").forEach(s=>{ const t=(doc.texts||[]).find(x=>x.id===s.id);
    if(t){ const id2=uid("tx"); doc.texts.push(Object.assign({},t,{id:id2,x:t.x+OFF,y:t.y+OFF}));
      newSel.push({type:"text",id:id2}); } });
  if(newSel.length){ setSel(newSel); addXP(5); pushHistory(); render(); } }

function deleteSelected(){ if(!selection.length)return;
  selection.forEach(s=>{
    if(s.type==="wall"){ doc.walls=doc.walls.filter(x=>x.id!==s.id); doc.openings=doc.openings.filter(o=>o.wallId!==s.id); }
    else if(s.type==="element") doc.elements=doc.elements.filter(x=>x.id!==s.id);
    else if(s.type==="text") doc.texts=doc.texts.filter(x=>x.id!==s.id);
    else if(s.type==="opening") doc.openings=doc.openings.filter(x=>x.id!==s.id);
    else if(s.type==="label") doc.labels=doc.labels.filter(x=>x.id!==s.id);
    else if(s.type==="dim") doc.dims=doc.dims.filter(x=>x.id!==s.id);
    else if(s.type==="route") doc.routes=doc.routes.filter(x=>x.id!==s.id);
    else if(s.type==="photo"){ const ph=doc.photos.find(x=>x.id===s.id); if(ph&&ph.fotoId)fotoDel(ph.fotoId);
      doc.photos=doc.photos.filter(x=>x.id!==s.id); }
    else if(s.type==="stair") doc.stairs=doc.stairs.filter(x=>x.id!==s.id);
  });
  doc.elements.forEach(sw=>{ if(sw.controla) sw.controla=sw.controla.filter(id=>doc.elements.some(x=>x.id===id)); });
  setSel([]); pushHistory(); render(); }
