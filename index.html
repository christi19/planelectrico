<title>PlanEléctrico Pro — Editor de planos</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0e1e39">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
  :root{
    --font: system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono: ui-monospace,"Cascadia Code","Consolas",monospace;
    --bg:#0e1e39; --panel:#132741; --panel2:#0f2038; --stage:#0b1a31;
    --ink:#dbe6f5; --soft:#93aacb; --faint:#5f78a0;
    --line:rgba(120,160,210,.20); --line2:rgba(120,160,210,.35);
    --blue:#5fa0e0; --accent:#f0a93c; --ok:#4cc38a; --danger:#f2707a;
    --sel:#ffcf5a; --grid:rgba(120,170,230,.16); --gridmaj:rgba(120,170,230,.32);
    --wall:#c9d6ea; --wall3d:#b7c6dc;
  }
  :root[data-theme="light"]{
    --bg:#e7edf4; --panel:#f6f9fc; --panel2:#eef3f9; --stage:#f0f4f9;
    --ink:#16273f; --soft:#4a5c74; --faint:#7688a0;
    --line:#cbd6e4; --line2:#9fb2ca;
    --blue:#2f6db3; --accent:#c9781a; --ok:#2f9e6b; --danger:#cf3f4b;
    --sel:#c98a12; --grid:rgba(47,109,179,.12); --gridmaj:rgba(47,109,179,.22);
    --wall:#3a4a63; --wall3d:#6b7d99;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);overflow:hidden;
       display:flex;flex-direction:column;user-select:none;}

  /* ---------- Top bar ---------- */
  .topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--line);}
  .brand{font-weight:800;letter-spacing:-.01em;font-size:16px;display:flex;align-items:center;gap:8px;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);}
  .brand small{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.1em;}
  .spacer{flex:1;}
  .grp{display:flex;gap:4px;align-items:center;}
  button{font-family:var(--font);font-size:13px;color:var(--ink);background:var(--panel2);
    border:1px solid var(--line);border-radius:7px;padding:7px 10px;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;min-height:36px;transition:.12s;}
  button:hover{border-color:var(--line2);}
  button:active{transform:translateY(1px);}
  button.on{background:var(--blue);border-color:var(--blue);color:#fff;}
  button.ghost{background:transparent;}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}
  button:disabled{opacity:.4;cursor:default;}
  .save{font-family:var(--mono);font-size:11px;color:var(--soft);display:flex;align-items:center;gap:6px;}
  .save .led{width:8px;height:8px;border-radius:50%;background:var(--ok);}
  .save.busy .led{background:var(--accent);}
  .save.err .led{background:var(--danger);}

  /* ---------- Body ---------- */
  .body{flex:1;display:flex;min-height:0;position:relative;}

  /* Tool rail */
  .rail{width:64px;background:var(--panel);border-right:1px solid var(--line);
    display:flex;flex-direction:column;gap:4px;padding:8px 6px;overflow-y:auto;flex:none;}
  .tool{width:52px;height:52px;flex:none;border-radius:9px;flex-direction:column;gap:2px;
    font-size:10px;line-height:1;padding:4px;color:var(--soft);}
  .tool .ic{font-size:19px;transition:transform .14s ease;}
  .tool.on{color:#fff;}
  .rail .sep{height:1px;background:var(--line);margin:4px 4px;}
  /* Hover en el rail: el ícono crece y se resalta para verlo bien (solo con mouse real, nunca en táctil) */
  @media (hover:hover){
    .tool{transition:background .14s ease,color .14s ease;}
    .tool:hover{background:var(--panel2);color:var(--ink);}
    .tool:hover .ic{transform:scale(1.55);}
    .tool.on:hover{color:#fff;}
  }

  /* Stage */
  .stagewrap{flex:1;position:relative;min-width:0;background:var(--stage);overflow:hidden;}
  svg#canvas{width:100%;height:100%;display:block;touch-action:none;cursor:crosshair;}
  svg#canvas.pan{cursor:grab;}
  .hint{position:absolute;left:50%;top:14px;transform:translateX(-50%);
    background:var(--panel);border:1px solid var(--line);border-radius:20px;
    padding:6px 14px;font-size:12px;color:var(--soft);pointer-events:none;
    box-shadow:0 4px 16px rgba(0,0,0,.2);max-width:90%;text-align:center;}
  .zoombar{position:absolute;right:12px;bottom:12px;display:flex;flex-direction:column;gap:6px;}
  .zoombar button{width:40px;height:40px;justify-content:center;padding:0;font-size:18px;background:var(--panel);}
  .zoombar button.on{border-color:var(--accent);color:var(--accent);}
  #zcli{flex-direction:column;gap:1px;height:auto;min-height:40px;padding:5px 0 4px;line-height:1;}
  #zcli .ic{font-size:18px;}
  #zcli .lbl{font-size:8.5px;font-weight:700;letter-spacing:.02em;}
  body.mobile #zcli{min-height:42px;}

  /* 3D overlay */
  #view3d{position:absolute;inset:0;display:none;overflow:hidden;
    background:radial-gradient(ellipse at 50% 20%,rgba(120,170,230,.10),transparent 60%),var(--stage);
    touch-action:none;cursor:grab;perspective:1400px;}
  #scene{position:absolute;left:50%;top:56%;transform-style:preserve-3d;}
  .p3{position:absolute;transform-style:preserve-3d;}
  .floor{background:
      linear-gradient(var(--grid) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:50px 50px;border:1px solid var(--line2);}
  .wall3d{background:var(--wall3d);border:1px solid rgba(0,0,0,.25);opacity:var(--xop,1);
    backface-visibility:visible;box-shadow:inset 0 0 30px rgba(0,0,0,.12);}
  .ceil{background:rgba(150,170,200,.22);border:1px solid var(--line2);opacity:var(--xop,1);}
  .sprite{display:flex;align-items:center;justify-content:center;font-size:22px;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.4));}
  .cable{position:absolute;left:50%;top:0;width:2px;background:rgba(0,0,0,.35);transform:translateX(-50%);}
  .step3d{background:#c9b18f;border:1px solid rgba(0,0,0,.28);}
  .glass3d{background:rgba(120,190,235,.35);border:1px solid rgba(150,200,240,.55);opacity:var(--xop,1);}
  .door3d{background:#8a6242;border:1px solid rgba(0,0,0,.35);opacity:var(--xop,1);}
  .riser3d{background:#b39d7c;border:1px solid rgba(0,0,0,.28);}

  /* Inspector / right panel */
  .side{width:290px;background:var(--panel);border-left:1px solid var(--line);
    display:flex;flex-direction:column;flex:none;overflow:hidden;}
  .tabs{display:flex;border-bottom:1px solid var(--line);}
  .tabs button{flex:1;border:0;border-radius:0;background:transparent;color:var(--soft);
    border-bottom:2px solid transparent;min-height:42px;font-size:12px;}
  .tabs button.on{color:var(--ink);border-bottom-color:var(--accent);background:transparent;}
  .cotbadge{display:inline-block;min-width:17px;padding:1px 5px;margin-left:2px;border-radius:999px;
    background:var(--accent);color:#08131f;font-size:10px;font-weight:800;text-align:center;
    font-variant-numeric:tabular-nums;vertical-align:1px;}
  .cotbadge.pop{animation:cbpop .3s ease;}
  @keyframes cbpop{50%{transform:scale(1.4);}}
  .panelbody{flex:1;overflow-y:auto;padding:14px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--faint);margin-bottom:4px;}
  .field input,.field select,.field textarea{width:100%;background:var(--panel2);
    border:1px solid var(--line);border-radius:7px;color:var(--ink);padding:8px 9px;
    font-family:var(--font);font-size:13px;}
  .field textarea{resize:vertical;min-height:52px;}
  .row{display:flex;gap:8px;}
  .row>*{flex:1;}
  .muted{color:var(--soft);font-size:12px;line-height:1.5;}
  .big{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:26px;font-weight:800;}
  .kdt{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.08em;text-transform:uppercase;}
  .kdt.sec{color:var(--ink);font-weight:700;} /* títulos de sección: más blancos y en negrita */
  .kdt.sep{border-top:1.5px solid var(--accent);padding-top:11px;} /* separador amarillo entre secciones */
  .swatchrow{display:flex;flex-wrap:wrap;gap:6px;}
  .lyr{display:flex;align-items:center;gap:8px;padding:8px 6px;border-bottom:1px solid var(--line);cursor:pointer;font-size:13px;}
  .lyr input{width:16px;height:16px;}
  table.cot{width:100%;border-collapse:collapse;font-size:12px;}
  table.cot th,table.cot td{text-align:left;padding:6px 4px;border-bottom:1px solid var(--line);}
  table.cot td.n{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums;}
  table.cot tfoot td{font-weight:700;border-top:1px solid var(--line2);}
  .cottotal{position:sticky;top:-14px;z-index:5;margin:-14px -14px 10px;padding:12px 14px;
    background:var(--panel);border-bottom:2px solid var(--accent);
    display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
  .cottotal b{font-size:17px;font-variant-numeric:tabular-nums;font-family:var(--mono);}
  .cartrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);}
  .cartrow .ci{font-size:20px;flex:none;width:28px;text-align:center;}
  .cartrow .cn{flex:1;min-width:0;font-size:12.5px;}
  .cartrow .cn small{display:block;color:var(--soft);font-size:10.5px;}
  .cartrow .cq{flex:none;font-family:var(--mono);color:var(--soft);font-size:12px;}
  .cartrow input{width:60px;flex:none;background:var(--panel2);border:1px solid var(--line);
    border-radius:6px;color:var(--ink);padding:3px 4px;text-align:right;font-size:12px;}
  .cartrow .cs{flex:none;min-width:56px;text-align:right;font-variant-numeric:tabular-nums;
    font-family:var(--mono);font-size:12.5px;}
  #dragGhost{position:fixed;display:none;z-index:200;pointer-events:none;
    flex-direction:column;align-items:center;justify-content:center;gap:2px;
    width:64px;height:64px;border-radius:14px;background:var(--panel);
    border:1.5px solid var(--accent);box-shadow:0 12px 30px rgba(0,0,0,.45);
    transform:translate(-50%,-50%) scale(1.1);opacity:.92;font-size:10px;color:var(--ink);}
  #dragGhost .ic{font-size:26px;line-height:1;}
  #dragGhost.sobre{border-color:var(--ok,#3fb950);box-shadow:0 12px 30px rgba(0,0,0,.45),0 0 0 3px rgba(63,185,80,.25);}
  #dragGhost.suelta{transition:transform .15s,opacity .15s;transform:translate(-50%,-50%) scale(.3);opacity:0;}
  #dragGhost.vuelve{transition:left .18s ease,top .18s ease,opacity .18s;opacity:.3;}
  /* iOS/Safari solo honra touch-action:none de forma fiable para drags con pointer events;
     el scroll horizontal del rail se hace manual en activarDragFicha (gesto horizontal). */
  .tool.ficha{touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}
  .xp{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:var(--accent);}
  .xpbar{flex:1;height:6px;background:var(--panel2);border-radius:3px;overflow:hidden;}
  .xpbar i{display:block;height:100%;background:var(--accent);width:0;}
  .danger{color:var(--danger);border-color:var(--danger)!important;}
  /* Circuitos */
  .cir{border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:10px;background:var(--panel2);}
  .cir .head{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .cir .dotc{width:12px;height:12px;border-radius:3px;flex:none;}
  .cir .nm{font-weight:700;font-size:13px;flex:1;min-width:0;}
  .cir .meta{font-family:var(--mono);font-size:11px;color:var(--soft);}
  .capbar{height:7px;background:var(--bg);border-radius:4px;overflow:hidden;margin:6px 0 4px;}
  .capbar i{display:block;height:100%;border-radius:4px;}
  .cir .warn{font-size:11px;color:var(--danger);font-weight:700;}
  .cir .okc{font-size:11px;color:var(--ok);}
  .cir .row2{display:flex;gap:6px;align-items:center;font-size:12px;}
  .cir select,.cir input{background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--ink);padding:4px 6px;font-size:12px;}
  .disclaimer{font-size:10.5px;color:var(--faint);line-height:1.45;border-top:1px dashed var(--line);padding-top:8px;margin-top:10px;}
  #tip{position:fixed;z-index:80;pointer-events:none;display:none;background:var(--panel);
    border:1px solid var(--line2);border-radius:9px;padding:8px 11px;font-size:12px;
    max-width:250px;line-height:1.55;color:var(--soft);box-shadow:0 8px 24px rgba(0,0,0,.35);}
  #tip b{color:var(--ink);}
  /* Selector de forma de habitación */
  .shapebar{position:absolute;left:12px;top:12px;display:flex;gap:4px;background:var(--panel);
    border:1px solid var(--line);border-radius:9px;padding:4px;box-shadow:0 4px 16px rgba(0,0,0,.2);}
  .shapebar button{width:40px;height:40px;justify-content:center;font-weight:800;font-size:15px;}
  /* Barra de propiedades contextual (estilo Illustrator/Photoshop) */
  .ctxbar{position:absolute;left:50%;transform:translateX(-50%);top:66px;z-index:6;display:flex;flex-wrap:wrap;gap:8px;align-items:center;
    background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:6px 10px;box-shadow:0 6px 20px rgba(0,0,0,.28);max-width:calc(100% - 24px);}
  .ctxbar .cxg{display:flex;align-items:center;gap:5px;}
  .ctxbar label{font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;}
  .ctxbar select,.ctxbar input[type=number]{background:var(--panel2);border:1px solid var(--line);border-radius:6px;color:var(--ink);padding:4px 6px;font-size:12px;}
  .ctxbar input[type=number]{width:54px;}
  .ctxbar input[type=range]{width:92px;accent-color:var(--accent);}
  .ctxbar input[type=color]{width:32px;height:28px;padding:1px;border:1px solid var(--line);border-radius:6px;background:var(--panel2);}
  .ctxbar button{height:28px;padding:0 10px;font-size:12px;}
  /* Panel de Capas (Photoshop/Illustrator: ver / bloquear / opacidad) */
  .lyrrow{display:flex;align-items:center;gap:8px;padding:6px 2px;border-bottom:1px solid var(--line);}
  .lyrbtn{background:none;border:0;font-size:16px;cursor:pointer;padding:2px 5px;line-height:1;border-radius:6px;}
  .lyrbtn:hover{background:var(--panel2);}
  .lyrname{flex:1;font-size:12.5px;color:var(--ink);}
  .lyrop{width:68px;accent-color:var(--accent);}
  /* Biblioteca de símbolos buscable (inspector sin selección) */
  .symgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;}
  .symgrid button{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px 2px;min-height:52px;font-size:17px;}
  .symgrid small{font-size:9px;color:var(--soft);line-height:1.05;text-align:center;}
  .floorbar{position:absolute;left:12px;bottom:12px;display:flex;gap:4px;background:var(--panel);
    border:1px solid var(--line);border-radius:9px;padding:4px;z-index:5;box-shadow:0 4px 16px rgba(0,0,0,.2);}
  .floorbar button{min-height:34px;padding:4px 10px;font-size:12px;width:auto;font-weight:600;}
  /* Hoja de impresión / PDF */
  #printsheet{display:none;}
  @media print{
    body{overflow:visible!important;display:block!important;background:#fff!important;height:auto!important;}
    .topbar,.body{display:none!important;}
    #printsheet{display:block!important;background:#fff;color:#111;font-family:system-ui,sans-serif;
      --wall:#333;--wall3d:#777;--stage:#fff;--grid:#eee;--gridmaj:#ddd;--ink:#111;--soft:#444;
      --faint:#777;--panel:#fff;--panel2:#f4f4f4;--line:#ccc;--line2:#999;--blue:#245a92;
      --accent:#8a5a10;--sel:#333;--ok:#1e7a50;--danger:#b03040;}
    #printsheet .ph{display:flex;justify-content:space-between;align-items:flex-start;
      border-bottom:3px solid #245a92;padding-bottom:10px;margin-bottom:14px;}
    #printsheet h1{margin:0;font-size:22px;}
    #printsheet .pm{color:#444;font-size:13px;margin-top:4px;}
    #printsheet .pr{text-align:right;font-size:12px;color:#245a92;font-weight:700;line-height:1.5;}
    #printsheet .pplan{border:1px solid #ccc;margin:10px 0;}
    #printsheet .pplan svg{width:100%;height:520px;background:#fff;}
    #printsheet h2{font-size:15px;margin:14px 0 6px;color:#245a92;}
    #printsheet table{width:100%;border-collapse:collapse;font-size:12px;}
    #printsheet th,#printsheet td{border:1px solid #ccc;padding:5px 8px;text-align:left;}
    #printsheet th{background:#f0f4f8;}
    #printsheet .pfoot{margin-top:16px;font-size:10px;color:#666;border-top:1px solid #ccc;padding-top:8px;}
    #printsheet .firma{margin-top:28px;display:flex;gap:40px;font-size:12px;color:#444;}
    #printsheet .firma div{flex:1;border-top:1px solid #444;padding-top:4px;text-align:center;}
  }
  .status{padding:5px 12px;background:var(--panel2);border-top:1px solid var(--line);
    font-family:var(--mono);font-size:11px;color:var(--soft);display:flex;gap:16px;flex-wrap:wrap;}

  /* ===== MÓVIL (body.mobile — lo decide JS: táctil + ancho) ===== */
  .sheethandle{display:none;}
  .fabs{display:none;}
  html,body{overscroll-behavior:none;}
  body.mobile .topbar{flex-wrap:nowrap;overflow:visible;gap:6px;padding:6px 8px;
    padding-top:calc(6px + env(safe-area-inset-top));position:relative;z-index:45;}
  body.mobile .brand{font-size:14px;min-width:0;}
  body.mobile .brand small{display:none;}
  body.mobile #grpUndo,body.mobile #grpSnap,body.mobile #saveTxt{display:none;}
  body.mobile #grpAcciones>button{display:none;}
  body.mobile #grpAcciones #projBtn{display:inline-flex;}
  body.mobile #projName{max-width:84px;}
  body.mobile #menuMovil{display:inline-flex;font-size:20px;padding:4px 13px;font-weight:800;}
  body.mobile .save{margin-left:auto;}
  /* controles 3D flotan sobre el lienzo */
  body.mobile #v3dctrl{position:fixed;top:calc(54px + env(safe-area-inset-top));left:50%;
    transform:translateX(-50%);z-index:38;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:4px;box-shadow:0 6px 20px rgba(0,0,0,.3);}
  /* rail → dock horizontal inferior */
  body.mobile .rail{position:fixed;left:0;right:0;bottom:calc(60px + env(safe-area-inset-bottom));
    top:auto;width:100%;height:72px;flex-direction:row;overflow-x:auto;overflow-y:hidden;
    border-right:0;border-top:1px solid var(--line);z-index:35;padding:6px 8px;gap:6px;}
  body.mobile .rail::-webkit-scrollbar{display:none;}
  body.mobile .tool{width:56px;height:56px;}
  body.mobile .rail .sep{width:1px;height:auto;margin:6px 2px;}
  /* inspector → hoja inferior */
  body.mobile .side{position:fixed;left:0;right:0;bottom:0;top:auto;width:100%;
    height:calc(60px + env(safe-area-inset-bottom));transition:height .22s ease;
    border-left:0;border-top:1px solid var(--line2);z-index:40;
    border-radius:16px 16px 0 0;box-shadow:0 -10px 34px rgba(0,0,0,.4);
    padding-bottom:env(safe-area-inset-bottom);}
  body.mobile .side.mid{height:46vh;}
  body.mobile .side.full{height:88vh;}
  body.mobile .side .panelbody{display:none;}
  body.mobile .side.mid .panelbody,body.mobile .side.full .panelbody{display:block;}
  body.mobile .side .status{display:none;}
  body.mobile .sheethandle{display:block;height:16px;cursor:grab;touch-action:none;}
  body.mobile .sheethandle i{display:block;width:44px;height:5px;border-radius:3px;
    background:var(--line2);margin:6px auto 0;}
  /* Barra "Editar ▲": aparece en peek cuando hay algo seleccionado, sin tapar el plano */
  .sheethint{display:none;}
  body.mobile .side.hassel:not(.mid):not(.full){height:calc(112px + env(safe-area-inset-bottom));}
  body.mobile .side.hassel:not(.mid):not(.full) .sheethint{display:flex;align-items:center;
    justify-content:center;gap:8px;width:calc(100% - 24px);margin:0 12px 8px;padding:11px 12px;
    border-radius:11px;background:linear-gradient(180deg,#22589c,#1e4d8c);
    border:1px solid #14406f;color:#fff;font-size:14px;font-weight:800;letter-spacing:.01em;
    box-shadow:0 4px 14px rgba(6,20,45,.45);cursor:pointer;}
  body.mobile .side.hassel:not(.mid):not(.full) .sheethint b{font-weight:600;opacity:.9;font-size:12.5px;}
  body.mobile .side.hassel:not(.mid):not(.full) .sheethint b::before{content:"· ";opacity:.6;}
  body.mobile .tabs{overflow-x:auto;}
  body.mobile .tabs button{white-space:nowrap;flex:none;padding:0 16px;min-height:38px;}

function shadeHex(hex,k){ try{ const n=parseInt(hex.replace("#",""),16);
  const r=Math.min(255,Math.round(((n>>16)&255)*k)),g=Math.min(255,Math.round(((n>>8)&255)*k)),b2=Math.min(255,Math.round((n&255)*k));
  return "rgb("+r+","+g+","+b2+")"; }catch(e){ return hex; } }
function wallColor3d(w){ const a=N(w.a),b=N(w.b);
  const ang=(a&&b)?Math.atan2(b.y-a.y,b.x-a.x):0;
  const base=w.color||MAT_COLOR[w.material]||"#b7c6dc";
  return shadeHex(base,0.8+0.2*Math.abs(Math.cos(ang))); } // sombreado por orientación
const CIRCUIT_COLORS=["#e0644f","#4fa0e0","#4cc38a","#e0b34f","#b07fe0","#4fd0cc","#e07fb0","#9ec24f"];
const BREAKERS=[15,20,30,40,50];

// Estado del documento
let doc={ nodes:{}, walls:[], openings:[], elements:[], dims:[], labels:[], circuits:[], routes:[], photos:[], precios:{}, stairs:[], texts:[] };
let settings={ grid:true, snap:true, lock45:false, gridSize:5, gridMajor:100, wallH:250, wallT:10,
  moneda:"₡", precioPunto:15000, precioCableM:400, precioTuboM:570, desperdicio:10, voltaje:120, precios:{},
  roomShape:"rect", mNombre:"", mTel:"", mProyecto:"", varByCat:{} };
function normalizeDoc(d){ d.circuits=d.circuits||[]; d.elements=d.elements||[]; d.routes=d.routes||[];
  d.photos=d.photos||[]; d.precios=d.precios||{}; d.stairs=d.stairs||[]; d.nodes=d.nodes||{}; d.walls=d.walls||[]; d.openings=d.openings||[];

  d.elements.forEach(e=>{ if(e.circuitId===undefined)e.circuitId=null; });
  (d.circuits||[]).forEach((c,i)=>{ if(!c.fase) c.fase=(i%2?"B":"A"); });

function enPiso(x){ return ((x&&x.piso)||"p1")===((doc&&doc.pisoActivo)||"p1"); }

  return i>0?ps[i-1].id:null; }
function ghostWalls(){ const pid=pisoRef(); if(pid==null||settings.ghostPiso===false) return [];
  return doc.walls.filter(w=>(w.piso||"p1")===pid); }
function ghostNodes(){ const pid=pisoRef(); if(pid==null||settings.ghostPiso===false) return [];
  const out=[]; const seen=new Set();
  doc.walls.forEach(w=>{ if((w.piso||"p1")!==pid) return;
    [w.a,w.b].forEach(id=>{ if(!seen.has(id)&&doc.nodes[id]){ seen.add(id); out.push(doc.nodes[id]); } }); });
  return out; }
function routeLen(r){ let cm=0; for(let i=1;i<r.pts.length;i++)
  cm+=Math.hypot(r.pts[i].x-r.pts[i-1].x,r.pts[i].y-r.pts[i-1].y); return cm; }

function stairCalc(st){
  const alt=st.alturaTotal||((settings.wallH||250)+20);
  const chMax=st.chMax||18;
  const N=Math.max(2,Math.ceil(alt/chMax));   // contrahuellas
  const ch=alt/N;                              // contrahuella real
  const huellas=N-1;                           // huellas (pisadas)
  const huella=huellas>0?st.largo/huellas:st.largo;
  const blondel=2*ch+huella;                   // regla de Blondel 61–65 cm
  return {N,ch,huella,huellas,alt,blondel,

  const v=doc.elements.some(e=>e.circuitId===c.id&&elInfo(e.type).volt===240)?240:(settings.voltaje||120);

// Cable por circuito: si hay TUBERÍA DIBUJADA para el circuito, manda la ruta real;

  const rs=circuitRoutes(c);

    cm += Math.abs(e.x-p.x)+Math.abs(e.y-p.y) + 400 + 260*Math.abs(pisoIdx(e.piso)-pfl); });

function addCircuit(name,amps){ const c={id:uid("c"),name:name||("Circuito "+(doc.circuits.length+1)),

const clone=o=>JSON.parse(JSON.stringify(o));

function cableEntreDosM(a,b){
  const recta_m=dist(a,b)/CM_PER_M;
  const H=settings.wallH||250;
  const cm=(Math.abs(a.x-b.x)+Math.abs(a.y-b.y))+Math.max(0,H-alturaOf(a))+Math.max(0,H-alturaOf(b));
  const cable_m=(cm/CM_PER_M)*(1+(settings.desperdicio||0)/100);
  return { recta_m, cable_m, costo:cable_m*(settings.precioCableM||0) };
}
function snapNum(v){ return settings.snap? Math.round(v/settings.gridSize)*settings.gridSize : v; }

function findOrCreateNode(p){

  const id=uid("n"); doc.nodes[id]={x:p.x,y:p.y}; return id;

function nearestNode(p){ let best=null,bd=14/scale;
  const okN=new Set(); doc.walls.forEach(w=>{ if(enPiso(w)){ okN.add(w.a); okN.add(w.b); } });
  if(draft&&draft.startNode) okN.add(draft.startNode);
  for(const id in doc.nodes){ if(!okN.has(id))continue; const d=dist(doc.nodes[id],p); if(d<bd){bd=d;best=id;} } return best; }
const FONTS={sistema:"system-ui,-apple-system,'Segoe UI',sans-serif",serif:"Georgia,'Times New Roman',serif",mono:"'Cascadia Code',Consolas,monospace",redonda:"'Trebuchet MS','Segoe UI',sans-serif",manuscrita:"'Comic Sans MS','Segoe Print',cursive"};
const FONT_NOM={sistema:"Sistema",serif:"Serif",mono:"Mono",redonda:"Redonda",manuscrita:"Manuscrita"};
function grosorDe(w){ return (w&&w.t!=null)?w.t:settings.wallT; } // grosor por pared (w.t) con fallback al global settings.wallT
// ---- paredes curvas (Bézier cuadrática con offset perpendicular w.curve) ----
function wallCtrl(w){ const a=N(w.a),b=N(w.b);
  const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
  const L=Math.hypot(b.x-a.x,b.y-a.y)||1;
  const nx=-(b.y-a.y)/L, ny=(b.x-a.x)/L;
  return {x:mx+nx*(w.curve||0), y:my+ny*(w.curve||0)}; }
function wallPts(w,n){ const a=N(w.a),b=N(w.b); if(!a||!b)return[];
  if(!w.curve) return [{x:a.x,y:a.y},{x:b.x,y:b.y}];
  const c=wallCtrl(w); const out=[]; n=n||16;
  for(let i=0;i<=n;i++){ const t=i/n,u=1-t;
    out.push({x:u*u*a.x+2*u*t*c.x+t*t*b.x, y:u*u*a.y+2*u*t*c.y+t*t*b.y}); }
  return out; }
function wallLen(w){ const pts=wallPts(w,w&&w.curve?24:1); let L=0;
  for(let i=1;i<pts.length;i++) L+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);
  return L; }
function wallMid(w){ return wallPointAt(w,wallLen(w)/2); }
function wallPointAt(w,dcm){ const pts=wallPts(w,w&&w.curve?24:1); let acc=0;
  for(let i=1;i<pts.length;i++){
    const seg=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);
    if(acc+seg>=dcm||i===pts.length-1){
      const t=seg?Math.max(0,Math.min(1,(dcm-acc)/seg)):0;
      return {x:pts[i-1].x+(pts[i].x-pts[i-1].x)*t, y:pts[i-1].y+(pts[i].y-pts[i-1].y)*t,
        ang:Math.atan2(pts[i].y-pts[i-1].y,pts[i].x-pts[i-1].x)}; }
    acc+=seg; }
  const a=N(w.a); return {x:a?a.x:0,y:a?a.y:0,ang:0}; }
function angleOf(a,b){ return Math.atan2(b.y-a.y,b.x-a.x); }
// proyección de punto sobre segmento -> t en [0,1]
function projectOnWall(w,p){
  if(w.curve){ // pared curva: proyección por muestreo (t = fracción de longitud de arco)
    const pts=wallPts(w,24); let best={t:0,d:Infinity,x:pts[0].x,y:pts[0].y};
    let acc=0, total=0; const segL=[];
    for(let i=1;i<pts.length;i++){ const s=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);
      segL.push(s); total+=s; }
    for(let i=1;i<pts.length;i++){ const A=pts[i-1],B=pts[i];
      const dx=B.x-A.x,dy=B.y-A.y; const L2=dx*dx+dy*dy;
      let t=L2?((p.x-A.x)*dx+(p.y-A.y)*dy)/L2:0; t=Math.max(0,Math.min(1,t));
      const px=A.x+t*dx, py=A.y+t*dy; const d=Math.hypot(p.x-px,p.y-py);
      if(d<best.d){ best={t: total?(acc+t*segL[i-1])/total:0, d, x:px, y:py}; }
      acc+=segL[i-1]; }
    return best; }
  const a=N(w.a),b=N(w.b); const dx=b.x-a.x,dy=b.y-a.y;
  const L2=dx*dx+dy*dy; if(!L2)return{t:0,d:dist(a,p)};
  let t=((p.x-a.x)*dx+(p.y-a.y)*dy)/L2; t=Math.max(0,Math.min(1,t));
  const px=a.x+t*dx, py=a.y+t*dy; return {t, d:Math.hypot(p.x-px,p.y-py), x:px,y:py}; }
function nearestWall(p,maxd){ let best=null,bd=maxd||20/scale;
  for(const w of doc.walls){ if(!enPiso(w))continue; const pr=projectOnWall(w,p); if(pr.d<bd){bd=pr.d;best={w,pr};} } return best; }

/* ===================== Coordenadas ===================== */
function updateScale(){ const r=svg.getBoundingClientRect(); scale=r.width/vb.w; if(r.width) vb.h=vb.w*(r.height/r.width); applyViewBox(); }
function applyViewBox(){ svg.setAttribute("viewBox",`${vb.x} ${vb.y} ${vb.w} ${vb.h}`); }
function toWorld(ev){ const r=svg.getBoundingClientRect();
  return { x: vb.x+(ev.clientX-r.left)/r.width*vb.w, y: vb.y+(ev.clientY-r.top)/r.height*vb.h }; }
function zoomAt(cx,cy,factor){
  const r=svg.getBoundingClientRect();
  const wx=vb.x+(cx-r.left)/r.width*vb.w, wy=vb.y+(cy-r.top)/r.height*vb.h;
  vb.w=Math.max(200,Math.min(40000,vb.w*factor)); vb.h=vb.w*(r.height/r.width);
  vb.x=wx-(cx-r.left)/r.width*vb.w; vb.y=wy-(cy-r.top)/r.height*vb.h;
  updateScale(); render();
}
function fitView(){
  const r=svg.getBoundingClientRect(); const asp=r.height/r.width;
  let pts=[]; const npf=new Set();
  doc.walls.forEach(w=>{ if(enPiso(w)){ npf.add(w.a); npf.add(w.b); } });
  npf.forEach(id=>{ if(doc.nodes[id]) pts.push(doc.nodes[id]); });
  pts=pts.concat(doc.elements.filter(enPiso),doc.labels.filter(enPiso),(doc.texts||[]).filter(enPiso));
  if(!pts.length) pts=Object.values(doc.nodes).concat(doc.elements,doc.labels,doc.texts||[]);
  if(!pts.length){ vb={x:-200,y:-200,w:1400,h:1400*asp}; updateScale(); render(); return; }
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  pts.forEach(p=>{minx=Math.min(minx,p.x);miny=Math.min(miny,p.y);maxx=Math.max(maxx,p.x);maxy=Math.max(maxy,p.y);});
  const pad=120; let w=Math.max(600,(maxx-minx)+pad*2); let h=(maxy-miny)+pad*2;
  if(h/w<asp) h=w*asp; else w=h/asp;
  vb={x:(minx+maxx)/2-w/2, y:(miny+maxy)/2-h/2, w:w, h:w*asp};
  updateScale(); render();
}

let history=[], hi=-1;
function snap(){ return clone({nodes:doc.nodes,walls:doc.walls,openings:doc.openings,
  elements:doc.elements,dims:doc.dims,labels:doc.labels,
  circuits:doc.circuits,routes:doc.routes,photos:doc.photos,stairs:doc.stairs,texts:doc.texts}); }
function pruneNodes(){ const used=new Set();
  doc.walls.forEach(w=>{ used.add(w.a); used.add(w.b); });
  if(draft&&draft.startNode) used.add(draft.startNode);
  Object.keys(doc.nodes).forEach(id=>{ if(!used.has(id)) delete doc.nodes[id]; }); }
function pushHistory(){ pruneNodes(); history=history.slice(0,hi+1); history.push(snap());
  if(history.length>80) history.shift(); hi=history.length-1; scheduleSave(); }
function restore(s){ doc.nodes=s.nodes;doc.walls=s.walls;doc.openings=s.openings;
  doc.elements=s.elements;doc.dims=s.dims;doc.labels=s.labels;
  if(s.circuits)doc.circuits=s.circuits; if(s.routes)doc.routes=s.routes; if(s.photos)doc.photos=s.photos; if(s.stairs)doc.stairs=s.stairs; if(s.texts)doc.texts=s.texts;
  draft=null; hoverSnap=null; pruneNodes(); // el trazo en curso no sobrevive al deshacer: sin anclas huérfanas
  setSel([]); }
function undo(){ if(hi>0){ hi--; restore(clone(history[hi])); render(); scheduleSave(); } }
function redo(){ if(hi<history.length-1){ hi++; restore(clone(history[hi])); render(); scheduleSave(); } }
function updateHistBtns(){
  if(typeof hi!=='number') return;
  const canU=hi>0, canR=hi<history.length-1;
  ['undo','fabU'].forEach(id=>{const b=document.getElementById(id); if(b)b.disabled=!canU;});
  ['redo','fabR'].forEach(id=>{const b=document.getElementById(id); if(b)b.disabled=!canR;});
}

function fotoPut(id,blob){ return new Promise(r=>{ if(!idb)return r(false);
  try{ const tx=idb.transaction("fotos","readwrite"); tx.objectStore("fotos").put(blob,id);
    tx.oncomplete=()=>r(true); tx.onerror=()=>r(false); }catch(e){ r(false); } }); }

function fotoDel(id){ if(!idb)return;
  try{ idb.transaction("fotos","readwrite").objectStore("fotos").delete(id); }catch(e){} }
function downscaleFoto(file){ return new Promise(res=>{
  const img=new Image(); const url=URL.createObjectURL(file);
  img.onload=()=>{ const MAX=1280; let w=img.width,h=img.height;
    if(Math.max(w,h)>MAX){ const k=MAX/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k); }
    const c=document.createElement("canvas"); c.width=w; c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h); URL.revokeObjectURL(url);
    c.toBlob(b=>res(b),"image/jpeg",0.72); };
  img.onerror=()=>{ URL.revokeObjectURL(url); res(null); };
  img.src=url; }); }
function blobToDataURL(b){ return new Promise(r=>{ const fr=new FileReader();
  fr.onload=()=>r(fr.result); fr.onerror=()=>r(null); fr.readAsDataURL(b); }); }
function dataURLToBlob(du){ try{ const [h,b64]=du.split(","); const mime=(h.match(/data:(.*?);/)||[])[1]||"image/jpeg";
  const bin=atob(b64); const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime}); }catch(e){ return null; } }

function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }

function saveIndex(ix){ lsSet("planelectrico:idx",JSON.stringify(ix)); }
function reindexIds(){ let mx=0; const scan=o=>{ const m=/(\d+)$/.exec(o||""); if(m)mx=Math.max(mx,+m[1]); };
  Object.keys(doc.nodes).forEach(scan); doc.walls.forEach(w=>scan(w.id));
  doc.openings.forEach(o=>scan(o.id)); doc.elements.forEach(e=>scan(e.id));
  doc.circuits.forEach(c=>scan(c.id)); doc.routes.forEach(r=>scan(r.id));
  (doc.photos||[]).forEach(p=>scan(p.id)); (doc.stairs||[]).forEach(s=>scan(s.id)); doc.labels.forEach(l=>scan(l.id)); doc.dims.forEach(d=>scan(d.id)); (doc.texts||[]).forEach(t=>scan(t.id));
  ID=mx+1; }
function normalizeSettings(saved){ if(saved&&!saved.moneda){ settings.moneda="$"; }
  settings.precios=settings.precios||{}; settings.varByCat=settings.varByCat||{};
  if(settings.precioTuboM==null) settings.precioTuboM=DEF_MONEDA[settings.moneda].tubo;
  // auto-corrección: magnitudes que no corresponden a la moneda (p. ej. ₡570/m tubo con moneda $)
  const D=DEF_MONEDA[settings.moneda];
  if(settings.moneda==="$"){
    if(settings.precioTuboM>100) settings.precioTuboM=D.tubo;
    if(settings.precioCableM>100) settings.precioCableM=D.cable;
    if(settings.precioPunto>2000) settings.precioPunto=D.punto;
  } else {
    if(settings.precioTuboM<50) settings.precioTuboM=D.tubo;
    if(settings.precioCableM<50) settings.precioCableM=D.cable;
    if(settings.precioPunto<1000) settings.precioPunto=D.punto;
  } }
function doSave(){ try{
    lsSet("planelectrico:cfg",JSON.stringify({settings,xp}));
    if(projectId){
      localStorage.setItem("planelectrico:proj:"+projectId,JSON.stringify({doc,vb,name:projectName}));
      const ix=loadIndex(); const e=ix.find(p=>p.id===projectId);
      const meta={id:projectId,nombre:projectName,updated:Date.now(),paredes:doc.walls.length,elementos:doc.elements.length};
      if(e)Object.assign(e,meta); else ix.push(meta);
      saveIndex(ix); lsSet("planelectrico:cur",projectId);
    }
    setSave("","Guardado"); }
  catch(e){ storageOK=false; setSave("err","Solo memoria"); } }
function openProject(id,fit){ const raw=lsGet("planelectrico:proj:"+id); if(!raw) return false;
  try{ const s=JSON.parse(raw);
    doc=normalizeDoc(s.doc||{nodes:{},walls:[],openings:[],elements:[],dims:[],labels:[],circuits:[],routes:[],photos:[]});
    if(s.vb)vb=s.vb; projectId=id; projectName=s.name||"Proyecto"; fondoURL=null; fondoLoading=false;
    reindexIds(); setSel([]); draft=null; lsSet("planelectrico:cur",id);
    if(fit!==false){ history=[snap()]; hi=0; updateScale(); fitView(); updateProjLabel(); }
    return true; }catch(e){ return false; } }
function newProjectId(){ return "p"+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36); }
function createProject(nombre,docInicial){
  doc=normalizeDoc(docInicial||{nodes:{},walls:[],openings:[],elements:[],dims:[],labels:[],circuits:[],routes:[],photos:[]});
  projectId=newProjectId(); projectName=nombre||"Proyecto"; reindexIds();

function updateProjLabel(){ const s=document.getElementById("projName"); if(s) s.textContent=projectName; }
function loadSaved(){
  try{
    const cfg=lsGet("planelectrico:cfg");
    if(cfg){ const c=JSON.parse(cfg); settings=Object.assign(settings,c.settings||{});
      xp=c.xp||0; normalizeSettings(c.settings); }
    const cur=lsGet("planelectrico:cur");
    if(cur&&openProject(cur,false)) return true;
    const ix=loadIndex();
    if(ix.length&&openProject(ix[ix.length-1].id,false)) return true;
    // migración desde formato de una sola sesión (v1/v3)
    const raw=lsGet("planelectrico:v1")||lsGet("electroplan:v3");
    if(raw){ const s=JSON.parse(raw);
      if(!cfg&&s.settings){ settings=Object.assign(settings,s.settings); normalizeSettings(s.settings); xp=s.xp||0; }
      doc=normalizeDoc(s.doc); if(s.vb)vb=s.vb;
      projectId=newProjectId(); projectName="Mi primer proyecto"; reindexIds();

  }catch(e){ storageOK=false; }

// Nombre legible del objeto seleccionado, para la barra "Editar ▲" en móvil.
function nombreSel(){
  if(selection.length>1) return selection.length+" objetos";
  const s=selected; if(!s) return "";
  if(s.type==="wall") return "Pared";
  if(s.type==="element"){ const e=doc.elements.find(x=>x.id===s.id); return e?elInfo(e.type).name:"Elemento"; }
  if(s.type==="opening"){ const o=doc.openings.find(x=>x.id===s.id); return o?(o.kind==="door"?"Puerta":"Ventana"):"Apertura"; }

  selected=selection.length===1?selection[0]:null; }
function marqueeSelect(r){
  const inR=p=>p&&p.x>=r.x1&&p.x<=r.x2&&p.y>=r.y1&&p.y<=r.y2;
  // la marquesina respeta las capas: lo oculto o bloqueado (🔒) no se selecciona
  const selOK=k=>settings["layer_"+k]!==false&&settings["lock_"+k]!==true;
  const out=[];
  if(selOK("structure")) doc.walls.forEach(w=>{ if(!enPiso(w))return; const a=N(w.a),b=N(w.b);
    if(a&&b&&(inR(a)||inR(b)||inR(wallMid(w)))) out.push({type:"wall",id:w.id}); });
  if(selOK("electrical")) doc.elements.forEach(e=>{ if(enPiso(e)&&inR(e)) out.push({type:"element",id:e.id}); });
  if(selOK("labels")){ doc.labels.forEach(l=>{ if(enPiso(l)&&inR(l)) out.push({type:"label",id:l.id}); });
  (doc.texts||[]).forEach(t=>{ if(enPiso(t)&&inR(t)) out.push({type:"text",id:t.id}); });
  doc.dims.forEach(d=>{ if(enPiso(d)&&inR(d.a)&&inR(d.b)) out.push({type:"dim",id:d.id}); }); }
  doc.routes.forEach(r=>{ if(enPiso(r)&&r.pts&&r.pts.some(inR)) out.push({type:"route",id:r.id}); });
  (doc.photos||[]).forEach(ph=>{ if(enPiso(ph)&&inR(ph)) out.push({type:"photo",id:ph.id}); });
  (doc.stairs||[]).forEach(st=>{ if(enPiso(st)&&(inR(st)||inR(stairP(st,st.largo/2,0)))) out.push({type:"stair",id:st.id}); });
  return out;
}
function beginMoveSel(w){

    else if(s.type==="element"){ const e=doc.elements.find(x=>x.id===s.id); if(e) els.push(e); }

function finishDraft(){
  if(draft&&draft.type==="wall"&&draft.created&&draft.created.length){
    const ids=draft.created.slice(); draft=null; setTool("select");
    setSel(ids.map(id=>({type:"wall",id})));
  } else if(draft&&draft.type==="route"&&draft.pts.length>=2){
    // adopta el circuito del dispositivo tocado en el primer o último punto
    const near=p=>{ const e=doc.elements.find(x=>Math.hypot(x.x-p.x,x.y-p.y)<20&&x.circuitId); return e?e.circuitId:null; };
    const cid=near(draft.pts[0])||near(draft.pts[draft.pts.length-1]);
    const r={id:uid("r"),circuitId:cid,pts:draft.pts.slice(),piso:doc.pisoActivo};
    doc.routes.push(r); addXP(6); draft=null; pushHistory();
    setTool("select"); setSel([{type:"route",id:r.id}]);
  } else { draft=null; }
  render();
}

function render(skipPanel){
  while(svg.firstChild) svg.removeChild(svg.firstChild);
  drawGrid();
  // fondo de calco (foto/plano calibrado)
  if(doc.fondo){
    const f=doc.fondo; const href=f.dataInline||fondoURL;
    if(href){ svg.appendChild(el("image",{href:href,x:f.x,y:f.y,width:f.wCm,height:f.wCm*(f.ratio||0.7),
      opacity:f.opacity!=null?f.opacity:0.5,preserveAspectRatio:"none",
      "data-fondo":"1","data-layer":"fondo",style:"pointer-events:none"})); }
    else if(f.fotoId&&!fondoLoading){ fondoLoading=true;
      fotoGet(f.fotoId).then(b=>{ fondoLoading=false; if(b){ fondoURL=URL.createObjectURL(b); render(true); } }); }
  }
  if(calibMode&&calibMode.p1&&calibMode.cursor){
    svg.appendChild(el("line",{x1:calibMode.p1.x,y1:calibMode.p1.y,x2:calibMode.cursor.x,y2:calibMode.cursor.y,
      stroke:"var(--accent)","stroke-width":2,"vector-effect":"non-scaling-stroke","stroke-dasharray":"6 4",style:"pointer-events:none"}));
    const tc=el("text",{x:(calibMode.p1.x+calibMode.cursor.x)/2,y:(calibMode.p1.y+calibMode.cursor.y)/2,
      "font-size":18/scale,fill:"var(--accent)","text-anchor":"middle",dy:-10/scale,"font-weight":"800",style:"font-family:var(--mono)"});
    tc.textContent=fmt(Math.hypot(calibMode.cursor.x-calibMode.p1.x,calibMode.cursor.y-calibMode.p1.y));
    svg.appendChild(tc);
  }
  // 👻 calco del piso inferior (referencia para construir alineado)
  const gws=ghostWalls();
  if(gws.length){
    gws.forEach(w=>{ const a=N(w.a),b=N(w.b); if(!a||!b)return;
      if(w.curve){ const c=wallCtrl(w);
        svg.appendChild(el("path",{d:`M ${a.x} ${a.y} Q ${c.x} ${c.y} ${b.x} ${b.y}`,fill:"none",
          stroke:"var(--blue)","stroke-width":grosorDe(w),opacity:.16,"stroke-linecap":"round",style:"pointer-events:none"}));
      } else svg.appendChild(el("line",{x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:"var(--blue)",
        "stroke-width":grosorDe(w),opacity:.16,"stroke-linecap":"round",style:"pointer-events:none"})); });
    const pidR=pisoRef();
    doc.elements.forEach(e=>{ if((e.piso||"p1")!==pidR)return;
      svg.appendChild(el("circle",{cx:e.x,cy:e.y,r:5/scale,fill:"var(--blue)",opacity:.25,style:"pointer-events:none"})); });
    ghostNodes().forEach(n=>{ svg.appendChild(el("circle",{cx:n.x,cy:n.y,r:4/scale,fill:"none",
      stroke:"var(--blue)","stroke-width":1.2/scale,opacity:.35,style:"pointer-events:none"})); });
  }
  // relleno suave de habitaciones (el plano "se lee")
  const roomsAct=detectRooms();
  roomsAct.forEach(r=>{ svg.appendChild(el("polygon",{points:r.poly.map(p=>p.x+","+p.y).join(" "),
    fill:"var(--blue)","fill-opacity":.05,style:"pointer-events:none"})); });
  const gWalls=el("g",{}), gOpen=el("g",{}), gElem=el("g",{}), gDim=el("g",{}), gLbl=el("g",{});
  gWalls.dataset.layer="structure"; gOpen.dataset.layer="openings";
  gElem.dataset.layer="electrical"; gLbl.dataset.layer="labels"; gDim.dataset.layer="labels";
  [gWalls,gOpen,gElem,gDim,gLbl].forEach(g=>svg.appendChild(g));

  // paredes (rectas o curvas)
  doc.walls.forEach(w=>{ if(!enPiso(w))return; const a=N(w.a),b=N(w.b); if(!a||!b)return;
    const isSel=isSelected("wall",w.id);
    const common={fill:"none","stroke-linecap":"round","data-id":w.id,"data-kind":"wall",style:"cursor:move"};
    let dPath=null;
    if(w.curve){ const c=wallCtrl(w); dPath=`M ${a.x} ${a.y} Q ${c.x} ${c.y} ${b.x} ${b.y}`; }
    const mk=(attrs)=>{ return dPath
      ? el("path",Object.assign({d:dPath},attrs))
      : el("line",Object.assign({x1:a.x,y1:a.y,x2:b.x,y2:b.y},attrs)); };
    // zona de clic gorda (invisible)
    gWalls.appendChild(mk(Object.assign({},common,{stroke:"transparent",
      "stroke-width":Math.max(grosorDe(w),22/scale)})));
    gWalls.appendChild(mk(Object.assign({},common,{stroke:(w.color||"var(--wall)"),"stroke-width":grosorDe(w)})));
    if(isSel){ gWalls.appendChild(mk({fill:"none",stroke:"var(--sel)","stroke-width":grosorDe(w)+6,
      "stroke-linecap":"round",opacity:.35,style:"pointer-events:none"})); }
    // medida sobre el punto medio del arco
    const L=wallLen(w); const mp=wallPointAt(w,L/2); const ang=mp.ang*180/Math.PI;
    if(L*scale>36/mfs()){ // LOD: ocultar medidas de paredes chicas en pantalla
    const t=el("text",{x:mp.x,y:mp.y,fill:"var(--ink)","font-size":13*mfs()/scale,
      "text-anchor":"middle",dy:-(grosorDe(w)/2+6)/scale,style:"pointer-events:none;font-family:var(--mono)",
      transform:`rotate(${Math.abs(ang)>90?ang+180:ang} ${mp.x} ${mp.y})`});
    t.textContent=fmt(L)+(w.curve?" ⌒":"")+(w.name?" · "+w.name:""); gWalls.appendChild(t); }
    // rombo de curvatura estilo Illustrator (pared seleccionada, herramienta Sel)
    if(isSel&&selection.length===1&&tool==="select"){
      const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
      gWalls.appendChild(el("line",{x1:mx,y1:my,x2:mp.x,y2:mp.y,stroke:"var(--sel)",
        "stroke-width":1,"vector-effect":"non-scaling-stroke","stroke-dasharray":"4 3",
        style:"pointer-events:none"}));
      const s=12/scale;
      gWalls.appendChild(el("rect",{x:mp.x-s,y:mp.y-s,width:s*2,height:s*2,
        transform:`rotate(45 ${mp.x} ${mp.y})`,fill:w.curve?"var(--sel)":"var(--panel)",
        stroke:"var(--sel)","stroke-width":2/scale,
        "data-id":w.id,"data-kind":"chandle",style:"cursor:grab"}));
    }
  });
  // escaleras (símbolo normativo con conteo de escalones)
  (doc.stairs||[]).forEach(st=>{ if(!enPiso(st))return;
    const c=stairCalc(st); const hw=st.ancho/2;
    const isSel=isSelected("stair",st.id);
    const p1=stairP(st,0,-hw),p2=stairP(st,st.largo,-hw),p3=stairP(st,st.largo,hw),p4=stairP(st,0,hw);
    gWalls.appendChild(el("polygon",{points:[p1,p2,p3,p4].map(p=>p.x+","+p.y).join(" "),
      fill:"var(--panel2)","fill-opacity":.55,
      stroke:isSel?"var(--sel)":"var(--line2)","stroke-width":isSel?2.5:1.5,
      "vector-effect":"non-scaling-stroke","data-id":st.id,"data-kind":"stair",style:"cursor:move"}));
    for(let i=1;i<c.N;i++){ const d0=i*c.huella; if(d0>=st.largo)break;
      const q1=stairP(st,d0,-hw),q2=stairP(st,d0,hw);
      gWalls.appendChild(el("line",{x1:q1.x,y1:q1.y,x2:q2.x,y2:q2.y,stroke:"var(--line2)",
        "stroke-width":1,"vector-effect":"non-scaling-stroke",style:"pointer-events:none"})); }
    const f0=stairP(st,8,0), f1=stairP(st,Math.max(20,st.largo-14),0);
    gWalls.appendChild(el("line",{x1:f0.x,y1:f0.y,x2:f1.x,y2:f1.y,
      stroke:isSel?"var(--sel)":"var(--soft)","stroke-width":1.5,"vector-effect":"non-scaling-stroke",style:"pointer-events:none"}));
    const w1=stairP(st,Math.max(8,st.largo-28),-8),w2=stairP(st,Math.max(8,st.largo-28),8);
    gWalls.appendChild(el("polygon",{points:f1.x+","+f1.y+" "+w1.x+","+w1.y+" "+w2.x+","+w2.y,
      fill:isSel?"var(--sel)":"var(--soft)",style:"pointer-events:none"}));
    const mid=stairP(st,st.largo/2,-(hw+10)); const dg=st.ang*180/Math.PI;
    const tt=el("text",{x:mid.x,y:mid.y,"font-size":11/scale,fill:c.comoda?"var(--ink)":"var(--danger)",
      "text-anchor":"middle",style:"pointer-events:none;font-family:var(--mono)",
      transform:"rotate("+(Math.abs(dg)>90?dg+180:dg)+" "+mid.x+" "+mid.y+")"});
    if(st.largo*scale>50){ tt.textContent="SUBE · "+c.N+" esc."+(c.comoda?"":" ⚠"); gWalls.appendChild(tt); }
  });

  // nodos (anclas)
  const nodosPiso=new Set(); doc.walls.forEach(w=>{ if(enPiso(w)){ nodosPiso.add(w.a); nodosPiso.add(w.b); } });
  if(draft&&draft.startNode) nodosPiso.add(draft.startNode);
  if(!vistaCliente) Object.keys(doc.nodes).forEach(id=>{ if(!nodosPiso.has(id))return; const n=doc.nodes[id];
    const c=el("circle",{cx:n.x,cy:n.y,r:5/scale,fill:"var(--panel)",stroke:"var(--blue)",
      "stroke-width":2/scale,"data-node":id,"data-kind":"node",style:"cursor:grab",
      "vector-effect":"non-scaling-stroke"});
    gWalls.appendChild(c); });

  // aperturas (puertas/ventanas) — posición ABSOLUTA sobre la pared (sobrevive al estiramiento)
  doc.openings.forEach(o=>{ const w=doc.walls.find(x=>x.id===o.wallId); if(!w||!enPiso(w))return;
    const a=N(w.a),b=N(w.b); if(!a||!b)return;
    const L=wallLen(w); const margin=Math.min(o.width/2+5,L/2);
    if(o.d===undefined) o.d=(o.t!==undefined?o.t:0.5)*L; // migración
    const dpos=Math.max(margin,Math.min(o.d,L-margin)); // re-clamp si la pared encogió
    const pp=wallPointAt(w,dpos); const ang=pp.ang; const cx=pp.x, cy=pp.y;
    const hw=o.width/2; const ux=Math.cos(ang),uy=Math.sin(ang);
    const x1=cx-ux*hw,y1=cy-uy*hw,x2=cx+ux*hw,y2=cy+uy*hw;
    const isSel=isSelected("opening",o.id);
    // hueco
    gOpen.appendChild(el("line",{x1,y1,x2,y2,stroke:"var(--stage)","stroke-width":grosorDe(w)+2,
      "stroke-linecap":"butt",style:"pointer-events:none"}));
    if(o.kind==="door"){
      const ss=o.flip?-1:1;
      const hx=o.swing?x2:x1, hy=o.swing?y2:y1;
      const fx=o.swing?x1:x2, fy=o.swing?y1:y2;
      const lx=hx-ss*uy*o.width, ly=hy+ss*ux*o.width;
      const sweep=((o.flip?1:0)+(o.swing?1:0))%2;
      gOpen.appendChild(el("line",{x1:hx,y1:hy,x2:lx,y2:ly,
        stroke:"var(--soft)","stroke-width":1.5,"vector-effect":"non-scaling-stroke",style:"pointer-events:none"}));
      gOpen.appendChild(el("path",{d:`M ${fx} ${fy} A ${o.width} ${o.width} 0 0 ${sweep} ${lx} ${ly}`,
        fill:"none",stroke:"var(--soft)","stroke-width":1.2,"vector-effect":"non-scaling-stroke",style:"pointer-events:none"}));
    }else{ // ventana
      gOpen.appendChild(el("line",{x1,y1,x2,y2,stroke:"var(--blue)","stroke-width":3,
        "vector-effect":"non-scaling-stroke",style:"pointer-events:none"}));
    }
    // medida visible de la apertura (rotada como la de la pared)
    const degA=ang*180/Math.PI;
    if(o.width*scale>26/mfs()){
    const mt=el("text",{x:cx,y:cy,"font-size":11*mfs()/scale,fill:o.kind==="door"?"var(--soft)":"var(--blue)",
      "text-anchor":"middle",dy:(grosorDe(w)/2+13)/scale,
      style:"pointer-events:none;font-family:var(--mono)",
      transform:`rotate(${Math.abs(degA)>90?degA+180:degA} ${cx} ${cy})`});
    mt.textContent=fmt(o.width); gOpen.appendChild(mt); }
    // zona de agarre central (mover a lo largo de la pared)
    gOpen.appendChild(el("circle",{cx,cy,r:Math.max(12/scale,hw*0.6),fill:"transparent",
      stroke:isSel?"var(--sel)":"transparent","stroke-width":2/scale,
      "data-id":o.id,"data-kind":"opening",style:"cursor:move"}));
    // agarraderas de estiramiento en los extremos
    if(isSel){ [[x1,y1,0],[x2,y2,1]].forEach(([hx,hy,end])=>{
      gOpen.appendChild(el("rect",{x:hx-7/scale,y:hy-7/scale,width:14/scale,height:14/scale,
        fill:"var(--sel)",stroke:"var(--panel)","stroke-width":1.5/scale,
        "data-id":o.id,"data-kind":"ohandle","data-end":end,style:"cursor:ew-resize"})); }); }
  });

  // vínculos apagador → luz (raya curva punteada, estilo plano eléctrico) — ocultos en vista cliente
  if(!vistaCliente) doc.elements.forEach(sw=>{ if(!enPiso(sw)||!SWITCH_TYPES.includes(sw.type)||!sw.controla||!sw.controla.length) return;
    const hot=isSelected("element",sw.id)||linkMode===sw.id;
    sw.controla.forEach(lid=>{ const lz=doc.elements.find(x=>x.id===lid); if(!lz||!enPiso(lz)) return;
      const mx=(sw.x+lz.x)/2, my=(sw.y+lz.y)/2;
      const dx=lz.x-sw.x, dy=lz.y-sw.y; const Lq=Math.hypot(dx,dy)||1;
      const off=Math.min(60,20+Lq*0.12);
      const qx=mx-dy/Lq*off, qy=my+dx/Lq*off;
      const hl=isSelected("element",lid);
      gElem.appendChild(el("path",{d:`M ${sw.x} ${sw.y} Q ${qx} ${qy} ${lz.x} ${lz.y}`,fill:"none",
        stroke:(hot||hl)?"var(--sel)":"var(--soft)","stroke-width":(hot||hl)?2:1.3,
        "vector-effect":"non-scaling-stroke","stroke-dasharray":"5 4",opacity:(hot||hl)?0.95:0.55,
        style:"pointer-events:none"}));
    }); });

  // elementos eléctricos
  doc.elements.forEach(e=>{ if(!enPiso(e))return; const info=elInfo(e.type); const isSel=isSelected("element",e.id);
    const cir=circuitOf(e.circuitId);
    const g=el("g",{"data-id":e.id,"data-kind":"element",style:"cursor:move"});
    g.appendChild(el("circle",{cx:e.x,cy:e.y,r:22/scale,fill:"transparent"})); // blanco táctil 44px
    if(cir&&!vistaCliente){ g.appendChild(el("circle",{cx:e.x,cy:e.y,r:20/scale,fill:"none",
      stroke:cir.color,"stroke-width":2.5/scale,opacity:.9})); }
    g.appendChild(el("circle",{cx:e.x,cy:e.y,r:16/scale,fill:"var(--panel)",
      stroke:isSel?"var(--sel)":"var(--line2)","stroke-width":(isSel?2.5:1.5)/scale}));
    const tx=el("text",{x:e.x,y:e.y,"font-size":18/scale,"text-anchor":"middle",dy:6/scale,style:"pointer-events:none"});
    tx.textContent=info.icon; g.appendChild(tx);
    if(e.label){ const lb=el("text",{x:e.x,y:e.y+24/scale,"font-size":11/scale,fill:"var(--soft)",
      "text-anchor":"middle",style:"pointer-events:none;font-family:var(--mono)"}); lb.textContent=e.label; g.appendChild(lb); }
    gElem.appendChild(g);
  });

  // rutas de tubería (canalización)
  doc.routes.forEach(r=>{ if(!enPiso(r)||!r.pts||r.pts.length<2)return;
    const cir=circuitOf(r.circuitId); const col=cir?cir.color:"var(--faint)";
    const ptsStr=r.pts.map(p=>p.x+","+p.y).join(" ");
    const isSel=isSelected("route",r.id);
    gElem.appendChild(el("polyline",{points:ptsStr,fill:"none",stroke:"transparent",
      "stroke-width":16/scale,"data-id":r.id,"data-kind":"route",style:"cursor:pointer"}));
    gElem.appendChild(el("polyline",{points:ptsStr,fill:"none",stroke:isSel?"var(--sel)":col,
      "stroke-width":isSel?3.5:2.5,"vector-effect":"non-scaling-stroke",
      "stroke-dasharray":"7 5","stroke-linejoin":"round",style:"pointer-events:none"}));
    r.pts.forEach(p=>gElem.appendChild(el("circle",{cx:p.x,cy:p.y,r:3/scale,fill:col,
      style:"pointer-events:none"})));
    const mid=r.pts[Math.floor(r.pts.length/2)];
    if(routeLen(r)*scale>48){
    const rt=el("text",{x:mid.x,y:mid.y,"font-size":11/scale,fill:col,"text-anchor":"middle",
      dy:-9/scale,style:"pointer-events:none;font-family:var(--mono)"});
    rt.textContent="tubo "+fmt(routeLen(r)); gElem.appendChild(rt); }
    if(routeLen(r)*scale>48)
    if(cir){ const ced=el("text",{x:mid.x,y:mid.y,"font-size":9.5/scale,fill:col,"text-anchor":"middle",
      dy:7/scale,style:"pointer-events:none;font-family:var(--mono)",opacity:.85});
      ced.textContent=cedulaDe(cir); gElem.appendChild(ced); }
  });

  // cotas — ocultas en vista cliente
  if(!vistaCliente) doc.dims.forEach(d=>{ if(!enPiso(d))return; const off=18*mfs()/scale;
    gDim.appendChild(el("line",{x1:d.a.x,y1:d.a.y,x2:d.b.x,y2:d.b.y,stroke:"transparent",
      "stroke-width":16/scale,"data-id":d.id,"data-kind":"dim",style:"cursor:pointer"})); // halo táctil para tocar la cota con el dedo
    gDim.appendChild(el("line",{x1:d.a.x,y1:d.a.y,x2:d.b.x,y2:d.b.y,stroke:"var(--accent)",
      "stroke-width":1,"vector-effect":"non-scaling-stroke","data-id":d.id,"data-kind":"dim",style:"cursor:pointer"}));
    const mid={x:(d.a.x+d.b.x)/2,y:(d.a.y+d.b.y)/2}; const ang=angleOf(d.a,d.b)*180/Math.PI;
    const t=el("text",{x:mid.x,y:mid.y-off,fill:"var(--accent)","font-size":13*mfs()/scale,"text-anchor":"middle",
      style:"pointer-events:none;font-family:var(--mono)",
      transform:`rotate(${Math.abs(ang)>90?ang+180:ang} ${mid.x} ${mid.y-off})`});
    t.textContent=fmt(dist(d.a,d.b)); gDim.appendChild(t);
  });

  // etiquetas de espacio (+ m² automáticos)
  const rooms=roomsAct;
  doc.labels.forEach(l=>{ if(!enPiso(l))return; const isSel=isSelected("label",l.id);
    const g=el("g",{"data-id":l.id,"data-kind":"label",style:"cursor:move"});
    const t=el("text",{x:l.x,y:l.y,"font-size":16/scale,fill:isSel?"var(--sel)":"var(--ink)",
      "text-anchor":"middle","font-weight":"700",style:"pointer-events:auto"});
    t.textContent=l.text; g.appendChild(t);
    const room=rooms.find(r=>pointInPoly(l,r.poly));
    if(room){ const a=el("text",{x:l.x,y:l.y+18/scale,"font-size":12/scale,fill:"var(--soft)",
      "text-anchor":"middle",style:"pointer-events:none;font-family:var(--mono)"});
      a.textContent=(room.area/10000).toFixed(1)+" m²"; g.appendChild(a); }
    gLbl.appendChild(g);
  });

  // textos libres (Canva: tipografía, tamaño y color; ◢ para redimensionar)
  (doc.texts||[]).forEach(tx=>{ if(!enPiso(tx))return; const isSel=isSelected("text",tx.id);
    const g=el("g",{"data-id":tx.id,"data-kind":"text",style:"cursor:move"});
    const t=el("text",{x:tx.x,y:tx.y,"font-size":(tx.size||40),fill:(tx.color||"var(--ink)"),
      "font-family":(FONTS[tx.font]||FONTS.sistema),"dominant-baseline":"hanging",style:"pointer-events:auto"});
    t.textContent=tx.text||" "; g.appendChild(t); gLbl.appendChild(g);
    if(isSel&&tool==="select"){ let bb; try{ bb=t.getBBox(); }catch(_){ bb=null; }
      if(bb){ g.appendChild(el("rect",{x:bb.x-4/scale,y:bb.y-4/scale,width:bb.width+8/scale,height:bb.height+8/scale,
        fill:"none",stroke:"var(--sel)","stroke-width":1,"vector-effect":"non-scaling-stroke","stroke-dasharray":"4 3",style:"pointer-events:none"}));
        const hx=bb.x+bb.width+4/scale, hy=bb.y+bb.height+4/scale, s=8/scale;
        g.appendChild(el("path",{d:`M ${hx-s} ${hy} L ${hx+s} ${hy} L ${hx+s} ${hy-2*s} Z`,
          fill:"var(--sel)",stroke:"var(--stage)","stroke-width":1/scale,"data-id":tx.id,"data-kind":"txresize",style:"cursor:nwse-resize"})); } }
  });

  // fotos ancladas
  (doc.photos||[]).forEach(ph=>{ if(!enPiso(ph))return; const isSel=isSelected("photo",ph.id);
    const g=el("g",{"data-id":ph.id,"data-kind":"photo",style:"cursor:move"});
    g.appendChild(el("circle",{cx:ph.x,cy:ph.y,r:14/scale,fill:"var(--panel)",
      stroke:isSel?"var(--sel)":"var(--accent)","stroke-width":(isSel?2.5:1.8)/scale}));
    const t=el("text",{x:ph.x,y:ph.y,"font-size":14/scale,"text-anchor":"middle",dy:5/scale,style:"pointer-events:none"});
    t.textContent="📷"; g.appendChild(t);
    if(ph.nota){ const n=el("text",{x:ph.x,y:ph.y+26/scale,"font-size":10/scale,fill:"var(--soft)",
      "text-anchor":"middle",style:"pointer-events:none"}); n.textContent=ph.nota.slice(0,20); g.appendChild(n); }
    gLbl.appendChild(g);
  });

  // borrador (dibujo en curso)
  if(draft) drawDraft();
  // marquesina de selección (estilo Illustrator)
  if(action&&action.type==="marquee"){
    const x=Math.min(action.x0,action.x1),y=Math.min(action.y0,action.y1);

const NOMTIPO={wall:"paredes",text:"textos",element:"elementos",opening:"puertas o ventanas"};
function copiarFormato(){ if(!selected) return; const t=selected.type; let props=null;
  if(t==="wall"){ const w=doc.walls.find(x=>x.id===selected.id); if(w) props={t:w.t,material:w.material,color:w.color}; }
  else if(t==="text"){ const x=doc.texts.find(o=>o.id===selected.id); if(x) props={font:x.font,size:x.size,color:x.color}; }
  else if(t==="element"){ const e=doc.elements.find(o=>o.id===selected.id); if(e) props={circuitId:e.circuitId,alturaCm:e.alturaCm}; }
  else if(t==="opening"){ const o=doc.openings.find(o2=>o2.id===selected.id); if(o) props={width:o.width,flip:o.flip,swing:o.swing}; }
  if(!props) return; fmtClip={type:t,props}; pintarFormato=true; updateHint();
  avisar("🖌 Formato copiado — tocá otros "+(NOMTIPO[t]||"objetos")+" para aplicarlo (Esc = terminar)."); render(); }
function aplicarFormato(t,id){ if(!fmtClip||fmtClip.type!==t) return false; const P=fmtClip.props;
  if(t==="wall"){ const w=doc.walls.find(x=>x.id===id); if(!w)return false; if(P.t!=null)w.t=P.t; w.material=P.material; w.color=P.color; }
  else if(t==="text"){ const x=doc.texts.find(o=>o.id===id); if(!x)return false; x.font=P.font; x.size=P.size; x.color=P.color; }
  else if(t==="element"){ const e=doc.elements.find(o=>o.id===id); if(!e)return false; e.circuitId=P.circuitId; if(P.alturaCm!=null)e.alturaCm=P.alturaCm; }
  else if(t==="opening"){ const o=doc.openings.find(o2=>o2.id===id); if(!o)return false; o.width=P.width; o.flip=P.flip; o.swing=P.swing; }
  else return false;
  pushHistory(); render(); return true; }

// Alinear / Distribuir (estilo panel Align de Illustrator) sobre objetos con x,y
function selPuntos(){ const buscar={element:doc.elements,text:doc.texts,label:doc.labels,photo:doc.photos,stair:doc.stairs};
  return selection.map(s=>{ const arr=buscar[s.type]; return arr?arr.find(o=>o.id===s.id):null; }).filter(o=>o&&o.x!=null&&o.y!=null); }
function alinear(modo){ const P=selPuntos();
  if(P.length<2){ avisar("Para alinear, seleccioná 2 o más objetos con posición (tomas, luces, textos…)."); return; }
  const xs=P.map(o=>o.x), ys=P.map(o=>o.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const cX=(minX+maxX)/2, cY=(minY+maxY)/2;
  P.forEach(o=>{ if(modo==="left")o.x=minX; else if(modo==="right")o.x=maxX; else if(modo==="cx")o.x=Math.round(cX);
    else if(modo==="top")o.y=minY; else if(modo==="bottom")o.y=maxY; else if(modo==="cy")o.y=Math.round(cY); });
  pushHistory(); render(); }
function distribuir(eje){ const P=selPuntos();
  if(P.length<3){ avisar("Para distribuir, seleccioná 3 o más objetos con posición (tomas, luces, textos…)."); return; }
  const k=eje==="h"?"x":"y";
  P.sort((a,b)=>a[k]-b[k]); const min=P[0][k], max=P[P.length-1][k], step=(max-min)/(P.length-1);
  P.forEach((o,i)=>{ o[k]=Math.round(min+step*i); }); pushHistory(); render(); }

// Guías inteligentes (Illustrator): al arrastrar, imán a la X/Y de otros objetos + línea magenta.
// Compara contra la posición CRUDA del puntero (rx,ry), no la cuantizada por la grilla — la guía le gana a la grilla.
function aplicarGuias(o,rx,ry){ smartGuides.length=0; if(!o||o.x==null) return;
  const px=(rx!=null?rx:o.x), py=(ry!=null?ry:o.y);
  const tol=8/scale; let bx=null,by=null,gx=null,gy=null;
  const cand=[...doc.elements,...(doc.texts||[]),...doc.labels];
  cand.forEach(c=>{ if(c.id===o.id||!enPiso(c)||c.x==null) return;
    const dx=Math.abs(c.x-px), dy=Math.abs(c.y-py);
    if(dx<tol&&(bx===null||dx<bx)){ bx=dx; gx=c; }
    if(dy<tol&&(by===null||dy<by)){ by=dy; gy=c; } });
  if(gx){ o.x=gx.x; smartGuides.push({v:gx.x}); }
  if(gy){ o.y=gy.y; smartGuides.push({h:gy.y}); }
}

/* ==== detección de habitaciones (m²) — ciclos simples de 3-6 paredes ==== */
function detectRooms(){
  const adj={}; doc.walls.forEach(w=>{ if(!enPiso(w))return; (adj[w.a]=adj[w.a]||[]).push(w.b); (adj[w.b]=adj[w.b]||[]).push(w.a); });
  const rooms=[]; const seen=new Set();
  // buscar rectángulos/polígonos por DFS corto
  function poly(ids){ return ids.map(i=>N(i)).filter(Boolean); }
  const nodes=Object.keys(adj);
  for(const start of nodes){
    const stack=[[start,[start]]];
    while(stack.length){ const [cur,path]=stack.pop();
      if(path.length>7) continue;
      for(const nx of adj[cur]||[]){
        if(nx===start && path.length>=3){ const key=[...path].sort().join("-");
          if(!seen.has(key)){ const P=poly(path); const A=Math.abs(polyArea(P));
            if(A>2000){ seen.add(key); rooms.push({poly:P,area:A}); } } continue; }
        if(!path.includes(nx)) stack.push([nx,[...path,nx]]);

    }

  rooms.sort((a,b)=>a.area-b.area);

}
function polyArea(P){ let a=0; for(let i=0;i<P.length;i++){ const j=(i+1)%P.length;
  a+=P[i].x*P[j].y-P[j].x*P[i].y; } return a/2; }
function pointInPoly(p,P){ let c=false; for(let i=0,j=P.length-1;i<P.length;j=i++){
  if(((P[i].y>p.y)!=(P[j].y>p.y)) && (p.x<(P[j].x-P[i].x)*(p.y-P[i].y)/(P[j].y-P[i].y)+P[i].x)) c=!c; } return c; }

function refSnapPoint(a,b){ // iguala a la medida de la 1ª pared del proyecto si está cerca
  if(!doc.walls.length) return b;
  const ref=wallLen(doc.walls[0]); if(!ref) return b;
  const L=Math.hypot(b.x-a.x,b.y-a.y); if(!L) return b;
  const tol=Math.max(6,Math.min(20,ref*0.05));
  if(Math.abs(L-ref)<=tol&&Math.abs(L-ref)>0.01){ const k=ref/L;
    return {x:a.x+(b.x-a.x)*k, y:a.y+(b.y-a.y)*k, refMatch:true}; }
  if(Math.abs(L-ref)<=0.01) return {x:b.x,y:b.y,refMatch:true};
  return b; }
function applyLock(a,b,forced){ // 45° si forced o settings.lock45
  if(!(forced||settings.lock45)) return b;
  const ang=Math.atan2(b.y-a.y,b.x-a.x); const step=Math.PI/4;
  const s=Math.round(ang/step)*step; const L=dist(a,b);
  return {x:a.x+Math.cos(s)*L, y:a.y+Math.sin(s)*L}; }

function snapRoutePoint(p){ // imán: dispositivo > nodo > grilla
  let best=null,bd=16/scale;
  doc.elements.forEach(e=>{ if(!enPiso(e))return; const d=Math.hypot(e.x-p.x,e.y-p.y); if(d<bd){bd=d;best=e;} });
  if(best){ hoverSnap={x:best.x,y:best.y}; return {x:best.x,y:best.y}; }
  const nn=nearestNode(p); if(nn){ hoverSnap=N(nn); return {x:N(nn).x,y:N(nn).y}; }
  hoverSnap=null; return {x:snapNum(p.x),y:snapNum(p.y)};
}
function snapWorld(p,fromNode){ // imán: nodo del piso activo > esquina del piso de abajo > pared del piso de abajo > grilla
  const nn=nearestNode(p); if(nn && (!fromNode||nn!==fromNode)){ hoverSnap=N(nn); return {x:N(nn).x,y:N(nn).y,node:nn}; }
  let mBest=null,md=12/scale;
  doc.walls.forEach(w2=>{ if(!enPiso(w2))return; const L2=wallLen(w2); if(L2<40)return;
    const mp=wallPointAt(w2,L2/2); const dm=Math.hypot(mp.x-p.x,mp.y-p.y);
    if(dm<md){md=dm;mBest=mp;} });
  if(mBest){ hoverSnap={x:mBest.x,y:mBest.y}; return {x:mBest.x,y:mBest.y,mid:true}; }
  let gBest=null,gd=14/scale;
  ghostNodes().forEach(n=>{ const d=Math.hypot(n.x-p.x,n.y-p.y); if(d<gd){gd=d;gBest=n;} });
  if(gBest){ hoverSnap={x:gBest.x,y:gBest.y}; return {x:gBest.x,y:gBest.y,ghost:true}; }
  let wBest=null,wd=12/scale;
  ghostWalls().forEach(w=>{ const pr=projectOnWall(w,p); if(pr.d<wd){wd=pr.d;wBest=pr;} });
  if(wBest){ hoverSnap={x:wBest.x,y:wBest.y}; return {x:wBest.x,y:wBest.y,ghost:true}; }
  hoverSnap=null; return {x:snapNum(p.x),y:snapNum(p.y)}; }

const tPointers=new Map(); let pinch=null, wasPinch=false;

svg.addEventListener("pointerdown",ev=>{

    if(action&&action.moved) pushHistory();

    if(draft&&draft.type!=="wall") draft=null; // el pellizco no debe crear cuartos/cotas a medias
    const pts=[...tPointers.values()];
    pinch={d0:Math.max(1,Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y)),
      mx:(pts[0].x+pts[1].x)/2,my:(pts[0].y+pts[1].y)/2,vb0:{x:vb.x,y:vb.y,w:vb.w,h:vb.h}};
    pinchT0=Date.now(); pinchMoved=false; pinchMidX=pinch.mx; pinchMidY=pinch.my;

  }
},true);
svg.addEventListener("pointermove",ev=>{
  if(ev.pointerType!=="touch"||!tPointers.has(ev.pointerId)) return;
  tPointers.set(ev.pointerId,{x:ev.clientX,y:ev.clientY});

    const pts=[...tPointers.values()];
    const d=Math.max(1,Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y));
    const mx=(pts[0].x+pts[1].x)/2,my=(pts[0].y+pts[1].y)/2;

    const w2=Math.max(200,Math.min(40000,pinch.vb0.w*k)); const h2=w2*(r.height/r.width);
    const wx=pinch.vb0.x+(pinch.mx-r.left)/r.width*pinch.vb0.w;
    const wy=pinch.vb0.y+(pinch.my-r.top)/r.height*pinch.vb0.h;
    vb.w=w2; vb.h=h2;
    vb.x=wx-(mx-r.left)/r.width*w2; vb.y=wy-(my-r.top)/r.height*h2;

function endTouch(ev){
